<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agenda una reunión · Two Travel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', sans-serif; background: #f7f5f2; color: #1a1814; min-height: 100vh; }
  .page { max-width: 700px; margin: 0 auto; padding: 32px 16px; }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo img { height: 36px; }
  .card { background: #fff; border-radius: 16px; border: 1px solid #e8e2d9; padding: 28px; margin-bottom: 20px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: #9a7d52; font-size: 14px; margin-bottom: 24px; }
  .concierge-info { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
  .avatar { width: 56px; height: 56px; border-radius: 50%; background: #e8e2d9; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: #9a7d52; flex-shrink: 0; }
  .concierge-name { font-size: 18px; font-weight: 600; }
  .concierge-role { font-size: 13px; color: #9a7d52; }

  /* Step indicators */
  .steps { display: flex; gap: 8px; margin-bottom: 28px; }
  .step { flex: 1; height: 4px; border-radius: 2px; background: #e8e2d9; transition: background .3s; }
  .step.active { background: #1a1814; }
  .step.done   { background: #9a7d52; }

  /* Calendar */
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-header button { background: none; border: 1px solid #e8e2d9; border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 16px; color: #1a1814; }
  .cal-header span { font-weight: 600; font-size: 15px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-day-label { text-align: center; font-size: 11px; color: #9a9a9a; font-weight: 600; padding: 4px 0; }
  .cal-day { text-align: center; padding: 8px 4px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all .15s; border: 1px solid transparent; }
  .cal-day:hover:not(.disabled):not(.empty) { background: #f5f0e8; border-color: #e8e2d9; }
  .cal-day.selected { background: #1a1814; color: #fff; }
  .cal-day.today { font-weight: 700; color: #9a7d52; }
  .cal-day.disabled { color: #ccc; cursor: default; }
  .cal-day.empty { cursor: default; }

  /* Time slots */
  .slots-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .slot { padding: 10px; border: 1px solid #e8e2d9; border-radius: 10px; text-align: center; cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; background: #fff; }
  .slot:hover { background: #f5f0e8; border-color: #c8bfb0; }
  .slot.selected { background: #1a1814; color: #fff; border-color: #1a1814; }

  /* Form */
  label { display: block; font-size: 12px; color: #6b6055; margin-bottom: 4px; font-weight: 500; }
  input, select { width: 100%; border: 1px solid #e8e2d9; border-radius: 10px; padding: 10px 14px; font-size: 14px; background: #fff; outline: none; transition: border .15s; }
  input:focus, select:focus { border-color: #9a7d52; }
  .field { margin-bottom: 16px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Buttons */
  .btn-primary { width: 100%; background: #1a1814; color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
  .btn-primary:hover { opacity: .85; }
  .btn-primary:disabled { opacity: .4; cursor: default; }
  .btn-back { background: none; border: none; color: #9a7d52; font-size: 13px; cursor: pointer; text-decoration: underline; margin-bottom: 16px; }

  /* Confirmation */
  .confirm-box { text-align: center; padding: 20px 0; }
  .confirm-icon { font-size: 52px; margin-bottom: 16px; }
  .confirm-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .confirm-sub { color: #6b6055; font-size: 14px; line-height: 1.6; }
  .meet-link { display: inline-block; margin-top: 16px; background: #f0fdf4; border: 1px solid #86efac; color: #166534; border-radius: 10px; padding: 10px 20px; font-size: 14px; font-weight: 600; text-decoration: none; }

  .loading { text-align: center; color: #9a7d52; padding: 32px; }
  .error-msg { color: #dc2626; font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>
<div class="page">
  <div class="logo">
    <img src="/twotravel-logo.png" alt="Two Travel" onerror="this.style.display='none'" />
    <div style="font-size:18px;font-weight:700;letter-spacing:2px;color:#1a1814" id="logoFallback">TWO TRAVEL</div>
  </div>

  <div class="card" id="mainCard">
    <!-- Concierge info -->
    <div class="concierge-info" id="conciergeInfo">
      <div class="avatar" id="conciergeAvatar">?</div>
      <div>
        <div class="concierge-name" id="conciergeName">Cargando…</div>
        <div class="concierge-role" id="conciergeRole">Two Travel</div>
      </div>
    </div>

    <!-- Step progress -->
    <div class="steps">
      <div class="step active" id="step1bar"></div>
      <div class="step" id="step2bar"></div>
      <div class="step" id="step3bar"></div>
    </div>

    <!-- STEP 1: Calendar -->
    <div id="step1">
      <h1>Elige una fecha</h1>
      <p class="subtitle">Selecciona el día para tu reunión</p>
      <div class="cal-header">
        <button onclick="prevMonth()">‹</button>
        <span id="calTitle"></span>
        <button onclick="nextMonth()">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- STEP 2: Time slots -->
    <div id="step2" style="display:none">
      <button class="btn-back" onclick="goStep(1)">← Cambiar fecha</button>
      <h1>Elige una hora</h1>
      <p class="subtitle" id="step2Date"></p>
      <div id="slotsLoading" class="loading">Consultando disponibilidad…</div>
      <div class="slots-grid" id="slotsGrid" style="display:none"></div>
      <p class="error-msg" id="slotsError" style="display:none"></p>
    </div>

    <!-- STEP 3: Your info -->
    <div id="step3" style="display:none">
      <button class="btn-back" onclick="goStep(2)">← Cambiar hora</button>
      <h1>Tu información</h1>
      <p class="subtitle" id="step3Summary"></p>
      <div class="field">
        <label>Nombre completo *</label>
        <input type="text" id="clientName" placeholder="Ana García" />
      </div>
      <div class="field">
        <label>Email *</label>
        <input type="email" id="clientEmail" placeholder="ana@email.com" />
      </div>
      <div class="field">
        <label>WhatsApp (opcional)</label>
        <input type="tel" id="clientPhone" placeholder="+57 300 000 0000" />
      </div>
      <p class="error-msg" id="bookError" style="display:none"></p>
      <button class="btn-primary" id="bookBtn" onclick="confirmBook()">Confirmar reserva</button>
    </div>

    <!-- STEP 4: Confirmation -->
    <div id="step4" style="display:none">
      <div class="confirm-box">
        <div class="confirm-icon">✅</div>
        <div class="confirm-title">¡Reunión agendada!</div>
        <div class="confirm-sub" id="confirmText"></div>
        <a id="meetLinkBtn" class="meet-link" target="_blank" style="display:none">🎥 Unirse a Google Meet</a>
      </div>
    </div>
  </div>
</div>

<script>
const params  = new URLSearchParams(location.search);
const slug    = params.get("c") || "";
const kickoffId = params.get("k") || "";

// Concierge profiles
const CONCIERGES = {
  caro:    { name: "Carolina Lopez",        role: "Senior Concierge Cartagena", initials: "CL" },
  alia:    { name: "Alia Jadad",            role: "Senior Concierge Cartagena", initials: "AJ" },
  daniela: { name: "Daniela Becerra",       role: "Senior Concierge Medellín",  initials: "DB" },
  nataly:  { name: "Nataly Cruz",           role: "Senior Concierge CDMX",      initials: "NC" },
  giulia:  { name: "Giulia Lorini Serrato", role: "Senior Concierge CDMX",      initials: "GL" },
  natalia: { name: "Natalia Peniche",       role: "Senior Concierge CDMX",      initials: "NP" },
};

const profile = CONCIERGES[slug];
if (profile) {
  document.getElementById("conciergeName").textContent = profile.name;
  document.getElementById("conciergeRole").textContent = profile.role;
  document.getElementById("conciergeAvatar").textContent = profile.initials;
} else {
  document.getElementById("conciergeName").textContent = "Two Travel";
}

// Calendar state
let viewYear  = new Date().getFullYear();
let viewMonth = new Date().getMonth();
let selDate   = null;
let selSlot   = null;

const MONTHS_ES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DAYS_ES   = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];

function renderCalendar() {
  const title = `${MONTHS_ES[viewMonth]} ${viewYear}`;
  document.getElementById("calTitle").textContent = title;

  const grid = document.getElementById("calGrid");
  grid.innerHTML = "";

  DAYS_ES.forEach(d => {
    const el = document.createElement("div");
    el.className = "cal-day-label";
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(viewYear, viewMonth, 1).getDay(); // 0=Sun
  const offset   = firstDay === 0 ? 6 : firstDay - 1; // Mon-first
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  for (let i = 0; i < offset; i++) {
    const el = document.createElement("div");
    el.className = "cal-day empty";
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(viewYear, viewMonth, d);
    const iso  = date.toISOString().slice(0,10);
    const el   = document.createElement("div");
    el.className = "cal-day";
    el.textContent = d;

    const isPast    = date < today;
    const isSunday  = date.getDay() === 0;
    const isToday   = date.toDateString() === today.toDateString();

    if (isPast || isSunday) {
      el.classList.add("disabled");
    } else {
      if (isToday) el.classList.add("today");
      if (selDate === iso) el.classList.add("selected");
      el.onclick = () => pickDate(iso);
    }
    grid.appendChild(el);
  }
}

function prevMonth() {
  if (viewMonth === 0) { viewMonth = 11; viewYear--; } else viewMonth--;
  renderCalendar();
}
function nextMonth() {
  if (viewMonth === 11) { viewMonth = 0; viewYear++; } else viewMonth++;
  renderCalendar();
}

async function pickDate(iso) {
  selDate = iso;
  renderCalendar();
  goStep(2);

  document.getElementById("step2Date").textContent = formatDate(iso);
  document.getElementById("slotsLoading").style.display = "block";
  document.getElementById("slotsGrid").style.display = "none";
  document.getElementById("slotsError").style.display = "none";

  try {
    const res  = await fetch(`/api/calendar/availability?concierge=${slug}&date=${iso}`);
    const data = await res.json();
    const grid = document.getElementById("slotsGrid");
    grid.innerHTML = "";

    if (!data.slots || data.slots.length === 0) {
      document.getElementById("slotsError").textContent = "No hay disponibilidad para este día. Elige otra fecha.";
      document.getElementById("slotsError").style.display = "block";
    } else {
      data.slots.forEach(s => {
        const el = document.createElement("div");
        el.className = "slot";
        el.textContent = s.start;
        el.dataset.start = s.start;
        el.dataset.end   = s.end;
        el.onclick = () => pickSlot(el, s);
        grid.appendChild(el);
      });
      grid.style.display = "grid";
    }
  } catch(e) {
    document.getElementById("slotsError").textContent = "Error al cargar disponibilidad. Intenta de nuevo.";
    document.getElementById("slotsError").style.display = "block";
  }
  document.getElementById("slotsLoading").style.display = "none";
}

function pickSlot(el, slot) {
  selSlot = slot;
  document.querySelectorAll(".slot").forEach(s => s.classList.remove("selected"));
  el.classList.add("selected");
  setTimeout(() => goStep(3), 300);
  document.getElementById("step3Summary").textContent = `${formatDate(selDate)} · ${selSlot.start} – ${selSlot.end}`;
}

async function confirmBook() {
  const name  = document.getElementById("clientName").value.trim();
  const email = document.getElementById("clientEmail").value.trim();
  const phone = document.getElementById("clientPhone").value.trim();
  const errEl = document.getElementById("bookError");
  errEl.style.display = "none";

  if (!name || !email) { errEl.textContent = "Por favor llena nombre y email."; errEl.style.display = "block"; return; }
  if (!/\S+@\S+\.\S+/.test(email)) { errEl.textContent = "Email inválido."; errEl.style.display = "block"; return; }

  const btn = document.getElementById("bookBtn");
  btn.disabled = true;
  btn.textContent = "Agendando…";

  try {
    const res  = await fetch("/api/calendar/book", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        concierge:   slug,
        date:        selDate,
        startTime:   selSlot.start,
        endTime:     selSlot.end,
        clientName:  name,
        clientEmail: email,
        clientPhone: phone,
        kickoffId,
      }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "Error al agendar");

    goStep(4);
    document.getElementById("confirmText").innerHTML =
      `Tu reunión con <strong>${profile?.name || "el concierge"}</strong> está confirmada para el<br><strong>${formatDate(selDate)} · ${selSlot.start}</strong><br><br>Te enviaremos un correo de confirmación a <strong>${email}</strong>`;

    if (data.meetLink) {
      const btn = document.getElementById("meetLinkBtn");
      btn.href = data.meetLink;
      btn.style.display = "inline-block";
    }
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = "block";
    btn.disabled = false;
    btn.textContent = "Confirmar reserva";
  }
}

function goStep(n) {
  [1,2,3,4].forEach(i => {
    document.getElementById(`step${i}`).style.display = i === n ? "block" : "none";
    const bar = document.getElementById(`step${i}bar`);
    if (bar) bar.className = "step " + (i < n ? "done" : i === n ? "active" : "");
  });
}

function formatDate(iso) {
  const d = new Date(iso + "T12:00:00");
  return d.toLocaleDateString("es-CO", { weekday:"long", day:"numeric", month:"long", year:"numeric" });
}

renderCalendar();
</script>
</body>
</html>
