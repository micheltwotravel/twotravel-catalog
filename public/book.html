<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agenda una reunión · Two Travel</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Jost', sans-serif;
    background: #f5f2ee;
    color: #1a1814;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: #1a1814;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .header img { height: 48px; filter: brightness(0) invert(1); }

  .layout {
    flex: 1;
    display: flex;
    gap: 0;
    max-width: 960px;
    margin: 0 auto;
    width: 100%;
    padding: 48px 16px;
  }

  /* Sidebar */
  .sidebar {
    width: 270px;
    flex-shrink: 0;
    padding-right: 48px;
    border-right: 1px solid #e0d9d0;
  }

  .concierge-photo {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #e0d9d0;
    margin-bottom: 14px;
    display: block;
  }
  .concierge-initials {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: #e8e2d9;
    border: 2px solid #d8d0c4;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    color: #9a7d52;
    margin-bottom: 14px;
  }
  .concierge-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    color: #1a1814;
    margin-bottom: 3px;
    line-height: 1.2;
  }
  .concierge-role {
    font-size: 11px;
    color: #9a7d52;
    letter-spacing: .06em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .divider { height: 1px; background: #e0d9d0; margin: 20px 0; }

  .detail-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 14px; }
  .detail-icon { font-size: 13px; color: #9a7d52; margin-top: 2px; width: 16px; flex-shrink: 0; }
  .detail-label { font-size: 10px; color: #9a9080; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 1px; }
  .detail-text { font-size: 13px; color: #3a3530; }

  /* Duration selector */
  .duration-pills { display: flex; gap: 8px; margin-top: 4px; }
  .dur-pill {
    padding: 5px 14px;
    border-radius: 99px;
    border: 1px solid #d8d0c4;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    color: #6b6055;
    background: #fff;
    transition: all .15s;
    font-family: 'Jost', sans-serif;
  }
  .dur-pill.active { background: #1a1814; color: #fff; border-color: #1a1814; }

  /* Main */
  .main { flex: 1; padding-left: 48px; }

  .step-label { font-size: 10px; color: #b0a090; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 8px; }
  h1 { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 400; color: #1a1814; margin-bottom: 4px; }
  .step-sub { font-size: 13px; color: #9a7d52; margin-bottom: 28px; }

  /* Calendar */
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .cal-nav {
    background: #fff;
    border: 1px solid #d8d0c4;
    border-radius: 8px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 16px;
    color: #6b6055;
    transition: all .15s;
  }
  .cal-nav:hover { border-color: #9a7d52; color: #1a1814; }
  .cal-month { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: #1a1814; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-day-label { text-align: center; font-size: 10px; color: #b0a090; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; padding: 4px 0 8px; }
  .cal-day {
    text-align: center;
    padding: 9px 4px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    color: #3a3530;
    transition: all .15s;
    border: 1px solid transparent;
    background: transparent;
  }
  .cal-day:hover:not(.disabled):not(.empty) { background: #fff; border-color: #d8d0c4; }
  .cal-day.selected { background: #1a1814; color: #fff; }
  .cal-day.today { color: #9a7d52; font-weight: 600; }
  .cal-day.disabled { color: #d0c8bc; cursor: default; }
  .cal-day.empty { cursor: default; }

  /* Slots */
  .slots-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .slot {
    padding: 10px 6px;
    border: 1px solid #d8d0c4;
    border-radius: 8px;
    text-align: center;
    cursor: pointer;
    font-size: 13px;
    color: #3a3530;
    transition: all .15s;
    background: #fff;
  }
  .slot:hover { border-color: #9a7d52; color: #1a1814; }
  .slot.selected { background: #1a1814; color: #fff; border-color: #1a1814; }

  /* Form */
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 10px; color: #9a9080; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
  input {
    width: 100%;
    background: #fff;
    border: 1px solid #d8d0c4;
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 14px;
    color: #1a1814;
    font-family: 'Jost', sans-serif;
    outline: none;
    transition: border-color .15s;
  }
  input::placeholder { color: #c0b8b0; }
  input:focus { border-color: #9a7d52; }

  .btn-primary {
    width: 100%;
    background: #1a1814;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Jost', sans-serif;
    letter-spacing: .06em;
    text-transform: uppercase;
    transition: opacity .15s;
    margin-top: 4px;
  }
  .btn-primary:hover { opacity: .82; }
  .btn-primary:disabled { opacity: .3; cursor: default; }

  .btn-back {
    background: none;
    border: none;
    color: #9a9080;
    font-size: 12px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 20px;
    font-family: 'Jost', sans-serif;
    transition: color .15s;
    padding: 0;
  }
  .btn-back:hover { color: #1a1814; }

  /* Confirmation */
  .confirm-box { text-align: center; padding: 40px 0; }
  .confirm-check {
    width: 64px; height: 64px; border-radius: 50%;
    background: #f0fdf4; border: 1px solid #bbf7d0;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; color: #16a34a; margin: 0 auto 20px; font-weight: 300;
  }
  .confirm-title { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 400; margin-bottom: 10px; }
  .confirm-sub { color: #6b6055; font-size: 14px; line-height: 1.8; }
  .meet-btn {
    display: inline-block; margin-top: 20px;
    background: #1a1814; color: #fff;
    border-radius: 10px; padding: 12px 24px;
    font-size: 13px; font-weight: 600;
    text-decoration: none; font-family: 'Jost', sans-serif;
    letter-spacing: .04em; transition: opacity .15s;
  }
  .meet-btn:hover { opacity: .82; }

  .loading { text-align: center; color: #9a9080; padding: 32px; font-size: 13px; }
  .error-msg { color: #dc2626; font-size: 12px; margin-top: 8px; }

  @media (max-width: 680px) {
    .layout { flex-direction: column; padding: 24px 16px; }
    .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #e0d9d0; padding-right: 0; padding-bottom: 28px; margin-bottom: 28px; }
    .main { padding-left: 0; }
    .slots-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<div class="header">
  <img src="/logo.png" alt="Two Travel" />
</div>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div id="conciergePhotoWrap"></div>
    <div class="concierge-name" id="conciergeName">Two Travel</div>
    <div class="concierge-role" id="conciergeRole">Concierge</div>

    <div class="divider"></div>

    <div class="detail-row">
      <div class="detail-icon">◷</div>
      <div>
        <div class="detail-label" id="lblDuration">Duración</div>
        <div class="duration-pills">
          <button class="dur-pill active" id="dur30" onclick="setDuration(30)">30 min</button>
          <button class="dur-pill" id="dur45" onclick="setDuration(45)">45 min</button>
        </div>
      </div>
    </div>

    <div class="detail-row">
      <div class="detail-icon">▶</div>
      <div>
        <div class="detail-label" id="lblFormat">Formato</div>
        <div class="detail-text">Google Meet</div>
      </div>
    </div>

    <div class="detail-row" id="selectedTimeDisplay" style="display:none">
      <div class="detail-icon">◉</div>
      <div>
        <div class="detail-label" id="lblSelected">Seleccionado</div>
        <div class="detail-text" id="selectedTimeText"></div>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- STEP 1: Calendar -->
    <div id="step1">
      <div class="step-label" id="s1label">Paso 1 de 3</div>
      <h1 id="s1title">Elige una fecha</h1>
      <p class="step-sub" id="s1sub">Selecciona el día para tu reunión</p>
      <div class="cal-header">
        <button class="cal-nav" onclick="prevMonth()">‹</button>
        <span class="cal-month" id="calTitle"></span>
        <button class="cal-nav" onclick="nextMonth()">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- STEP 2: Slots -->
    <div id="step2" style="display:none">
      <button class="btn-back" id="s2back" onclick="goStep(1)">← Cambiar fecha</button>
      <div class="step-label" id="s2label">Paso 2 de 3</div>
      <h1 id="s2title">Elige una hora</h1>
      <p class="step-sub" id="step2Date"></p>
      <div id="slotsLoading" class="loading">Consultando disponibilidad…</div>
      <div class="slots-grid" id="slotsGrid" style="display:none"></div>
      <p class="error-msg" id="slotsError" style="display:none"></p>
    </div>

    <!-- STEP 3: Info -->
    <div id="step3" style="display:none">
      <button class="btn-back" id="s3back" onclick="goStep(2)">← Cambiar hora</button>
      <div class="step-label" id="s3label">Paso 3 de 3</div>
      <h1 id="s3title">Tu información</h1>
      <p class="step-sub" id="step3Summary"></p>
      <div class="field">
        <label id="lblName">Nombre completo *</label>
        <input type="text" id="clientName" placeholder="Ana García" />
      </div>
      <div class="field">
        <label id="lblEmail">Email *</label>
        <input type="email" id="clientEmail" placeholder="ana@email.com" />
      </div>
      <div class="field">
        <label id="lblPhone">WhatsApp (opcional)</label>
        <input type="tel" id="clientPhone" placeholder="+57 300 000 0000" />
      </div>
      <p class="error-msg" id="bookError" style="display:none"></p>
      <button class="btn-primary" id="bookBtn" onclick="confirmBook()">Confirmar reunión</button>
    </div>

    <!-- STEP 4: Confirmation -->
    <div id="step4" style="display:none">
      <div class="confirm-box">
        <div class="confirm-check">✓</div>
        <div class="confirm-title" id="s4title">Reunión confirmada</div>
        <div class="confirm-sub" id="confirmText"></div>
        <a id="meetLinkBtn" class="meet-btn" target="_blank" style="display:none">Unirse a Google Meet</a>
      </div>
    </div>

  </div>
</div>

<script>
const params    = new URLSearchParams(location.search);
const slug      = params.get("c") || "";
const kickoffId = params.get("kickoffId") || params.get("k") || "";
const lang      = params.get("lang") || "en";

const T = {
  es: {
    title:         "Agenda una reunión",
    duration:      "Duración",
    format:        "Formato",
    selected:      "Seleccionado",
    step1Label:    "Paso 1 de 3",
    step1Title:    "Elige una fecha",
    step1Sub:      "Selecciona el día para tu reunión",
    step2Back:     "← Cambiar fecha",
    step2Label:    "Paso 2 de 3",
    step2Title:    "Elige una hora",
    step2Loading:  "Consultando disponibilidad…",
    step3Back:     "← Cambiar hora",
    step3Label:    "Paso 3 de 3",
    step3Title:    "Tu información",
    nameLabel:     "Nombre completo *",
    emailLabel:    "Email *",
    phoneLabel:    "WhatsApp (opcional)",
    bookBtn:       "Confirmar reunión",
    booking:       "Confirmando…",
    confirmTitle:  "Reunión confirmada",
    meetBtn:       "Unirse a Google Meet",
    errFields:     "Por favor llena nombre y email.",
    errEmail:      "Email inválido.",
    errNoSlots:    "No hay disponibilidad para este día. Elige otra fecha.",
    errLoad:       "Error al cargar disponibilidad.",
    confirmText:   (name, date, time, dur, email) =>
      `Tu reunión con <strong>${name}</strong> está confirmada<br>para el <strong>${date}</strong> a las <strong>${time}</strong> (${dur} min)<br><br>Recibirás un correo de confirmación en <strong>${email}</strong>`,
  },
  en: {
    title:         "Schedule a meeting",
    duration:      "Duration",
    format:        "Format",
    selected:      "Selected",
    step1Label:    "Step 1 of 3",
    step1Title:    "Choose a date",
    step1Sub:      "Select the day for your meeting",
    step2Back:     "← Change date",
    step2Label:    "Step 2 of 3",
    step2Title:    "Choose a time",
    step2Loading:  "Checking availability…",
    step3Back:     "← Change time",
    step3Label:    "Step 3 of 3",
    step3Title:    "Your information",
    nameLabel:     "Full name *",
    emailLabel:    "Email *",
    phoneLabel:    "WhatsApp (optional)",
    bookBtn:       "Confirm meeting",
    booking:       "Confirming…",
    confirmTitle:  "Meeting confirmed",
    meetBtn:       "Join Google Meet",
    errFields:     "Please fill in your name and email.",
    errEmail:      "Invalid email.",
    errNoSlots:    "No availability for this day. Please choose another date.",
    errLoad:       "Error loading availability.",
    confirmText:   (name, date, time, dur, email) =>
      `Your meeting with <strong>${name}</strong> is confirmed<br>for <strong>${date}</strong> at <strong>${time}</strong> (${dur} min)<br><br>You'll receive a confirmation email at <strong>${email}</strong>`,
  },
};
const t = T[lang] || T.en;

const CONCIERGES = {
  caro:    { name: "Carolina Lopez",        role: "Senior Concierge · Cartagena", initials: "CL" },
  alia:    { name: "Alia Jadad",            role: "Senior Concierge · Cartagena", initials: "AJ" },
  daniela: { name: "Daniela Becerra",       role: "Senior Concierge · Medellín",  initials: "DB" },
  nataly:  { name: "Nataly Cruz",           role: "Senior Concierge · CDMX",      initials: "NC" },
  giulia:  { name: "Giulia Lorini Serrato", role: "Senior Concierge · CDMX",      initials: "GL" },
  natalia: { name: "Natalia Peniche",       role: "Senior Concierge · CDMX",      initials: "NP" },
  michel:  { name: "Michel Sanchez",        role: "Admin · Cartagena",             initials: "MC" },
};

const profile = CONCIERGES[slug];
if (profile) {
  document.getElementById("conciergeName").textContent = profile.name;
  document.getElementById("conciergeRole").textContent = profile.role;

  // Load photo from GAS (Vercel Blob URL), fallback to initials
  const wrap = document.getElementById("conciergePhotoWrap");
  const GAS  = "https://script.google.com/macros/s/AKfycbwVj2nl99gFJB0ZeFIm_WrS2TepT2mu3m-tAoEy0Wc5-oO9Rj33i16nAp0jFBqLSI665A/exec";
  function showInitials() {
    const div = document.createElement("div");
    div.className = "concierge-initials";
    div.textContent = profile.initials;
    wrap.innerHTML = "";
    wrap.appendChild(div);
  }
  // Try to get photo URL from GAS
  fetch(GAS, { method:"POST", body: JSON.stringify({ action:"getCalendarToken", payload:{ concierge: `photo_${slug}` } }) })
    .then(r => r.json())
    .then(data => {
      const url = data?.refreshToken;
      if (!url) return showInitials();
      const img = document.createElement("img");
      img.className = "concierge-photo";
      img.alt = profile.name;
      img.src = url;
      img.onerror = showInitials;
      wrap.innerHTML = "";
      wrap.appendChild(img);
    })
    .catch(showInitials);
}

let duration = 30;
function setDuration(d) {
  duration = d;
  document.getElementById("dur30").classList.toggle("active", d === 30);
  document.getElementById("dur45").classList.toggle("active", d === 45);
  if (selDate) pickDate(selDate);
}

let viewYear  = new Date().getFullYear();
let viewMonth = new Date().getMonth();
let selDate   = null;
let selSlot   = null;

const MONTHS_ES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const MONTHS_EN = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS_ES   = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
const DAYS_EN   = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const MONTHS = lang === "es" ? MONTHS_ES : MONTHS_EN;
const DAYS   = lang === "es" ? DAYS_ES   : DAYS_EN;

function renderCalendar() {
  document.getElementById("calTitle").textContent = `${MONTHS[viewMonth]} ${viewYear}`;
  const grid = document.getElementById("calGrid");
  grid.innerHTML = "";
  DAYS.forEach(d => {
    const el = document.createElement("div"); el.className = "cal-day-label"; el.textContent = d; grid.appendChild(el);
  });
  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const offset   = firstDay === 0 ? 6 : firstDay - 1;
  const total    = new Date(viewYear, viewMonth + 1, 0).getDate();
  const today    = new Date(); today.setHours(0,0,0,0);
  for (let i = 0; i < offset; i++) {
    const el = document.createElement("div"); el.className = "cal-day empty"; grid.appendChild(el);
  }
  for (let d = 1; d <= total; d++) {
    const date = new Date(viewYear, viewMonth, d);
    const iso  = date.toISOString().slice(0,10);
    const el   = document.createElement("div"); el.className = "cal-day"; el.textContent = d;
    if (date < today || date.getDay() === 0) {
      el.classList.add("disabled");
    } else {
      if (date.toDateString() === today.toDateString()) el.classList.add("today");
      if (selDate === iso) el.classList.add("selected");
      el.onclick = () => pickDate(iso);
    }
    grid.appendChild(el);
  }
}

function prevMonth() { if (viewMonth === 0) { viewMonth = 11; viewYear--; } else viewMonth--; renderCalendar(); }
function nextMonth() { if (viewMonth === 11) { viewMonth = 0; viewYear++; } else viewMonth++; renderCalendar(); }

function addMinutes(time, mins) {
  const [h, m] = time.split(":").map(Number);
  const total  = h * 60 + m + mins;
  return `${String(Math.floor(total/60)).padStart(2,"0")}:${String(total%60).padStart(2,"0")}`;
}

async function pickDate(iso) {
  selDate = iso;
  renderCalendar();
  goStep(2);
  document.getElementById("step2Date").textContent = formatDate(iso);
  document.getElementById("slotsLoading").style.display = "block";
  document.getElementById("slotsGrid").style.display   = "none";
  document.getElementById("slotsError").style.display  = "none";

  try {
    const res  = await fetch(`/api/calendar/availability?concierge=${slug}&date=${iso}&duration=${duration}`);
    const data = await res.json();
    const grid = document.getElementById("slotsGrid");
    grid.innerHTML = "";
    if (data.error) {
      document.getElementById("slotsError").textContent = "Error: " + data.error;
      document.getElementById("slotsError").style.display = "block";
    } else if (!data.slots?.length) {
      document.getElementById("slotsError").textContent = t.errNoSlots;
      document.getElementById("slotsError").style.display = "block";
    } else {
      data.slots.forEach(s => {
        const el  = document.createElement("div");
        el.className  = "slot";
        el.textContent = s.start;
        const end = addMinutes(s.start, duration);
        el.onclick = () => pickSlot(el, { start: s.start, end });
        grid.appendChild(el);
      });
      grid.style.display = "grid";
    }
  } catch {
    document.getElementById("slotsError").textContent = t.errLoad;
    document.getElementById("slotsError").style.display = "block";
  }
  document.getElementById("slotsLoading").style.display = "none";
}

function pickSlot(el, slot) {
  selSlot = slot;
  document.querySelectorAll(".slot").forEach(s => s.classList.remove("selected"));
  el.classList.add("selected");
  const display = document.getElementById("selectedTimeDisplay");
  document.getElementById("selectedTimeText").textContent = `${formatDate(selDate)}\n${slot.start} – ${slot.end}`;
  display.style.display = "flex";
  setTimeout(() => {
    goStep(3);
    document.getElementById("step3Summary").textContent = `${formatDate(selDate)} · ${slot.start} – ${slot.end}`;
  }, 300);
}

async function confirmBook() {
  const name  = document.getElementById("clientName").value.trim();
  const email = document.getElementById("clientEmail").value.trim();
  const phone = document.getElementById("clientPhone").value.trim();
  const errEl = document.getElementById("bookError");
  errEl.style.display = "none";
  if (!name || !email) { errEl.textContent = t.errFields; errEl.style.display = "block"; return; }
  if (!/\S+@\S+\.\S+/.test(email)) { errEl.textContent = t.errEmail; errEl.style.display = "block"; return; }
  const btn = document.getElementById("bookBtn");
  btn.disabled = true; btn.textContent = t.booking;
  try {
    const res  = await fetch("/api/calendar/book", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ concierge: slug, date: selDate, startTime: selSlot.start, endTime: selSlot.end, clientName: name, clientEmail: email, clientPhone: phone, kickoffId, duration, lang }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "Error al agendar");
    goStep(4);
    document.getElementById("confirmText").innerHTML =
      t.confirmText(profile?.name || "Two Travel", formatDate(selDate), selSlot.start, duration, email);
    if (data.meetLink) {
      const meetBtn = document.getElementById("meetLinkBtn");
      meetBtn.href = data.meetLink; meetBtn.style.display = "inline-block";
    }
  } catch(e) {
    errEl.textContent = e.message; errEl.style.display = "block";
    btn.disabled = false; btn.textContent = "Confirmar reunión";
  }
}

function goStep(n) {
  [1,2,3,4].forEach(i => document.getElementById(`step${i}`).style.display = i === n ? "block" : "none");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function formatDate(iso) {
  const locale = lang === "es" ? "es-CO" : "en-US";
  return new Date(iso + "T12:00:00").toLocaleDateString(locale, { weekday:"long", day:"numeric", month:"long", year:"numeric" });
}

function applyTranslations() {
  document.getElementById("lblDuration").textContent  = t.duration;
  document.getElementById("lblFormat").textContent    = t.format;
  document.getElementById("lblSelected").textContent  = t.selected;
  document.getElementById("s1label").textContent      = t.step1Label;
  document.getElementById("s1title").textContent      = t.step1Title;
  document.getElementById("s1sub").textContent        = t.step1Sub;
  document.getElementById("s2back").textContent       = t.step2Back;
  document.getElementById("s2label").textContent      = t.step2Label;
  document.getElementById("s2title").textContent      = t.step2Title;
  document.getElementById("slotsLoading").textContent = t.step2Loading;
  document.getElementById("s3back").textContent       = t.step3Back;
  document.getElementById("s3label").textContent      = t.step3Label;
  document.getElementById("s3title").textContent      = t.step3Title;
  document.getElementById("lblName").textContent      = t.nameLabel;
  document.getElementById("lblEmail").textContent     = t.emailLabel;
  document.getElementById("lblPhone").textContent     = t.phoneLabel;
  document.getElementById("bookBtn").textContent      = t.bookBtn;
  document.getElementById("s4title").textContent      = t.confirmTitle;
  document.getElementById("meetLinkBtn").textContent  = t.meetBtn;
}

renderCalendar();
applyTranslations();
</script>
