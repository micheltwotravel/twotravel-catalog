<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Two Travel · Tasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --sand:#f7f4ef;--sand2:#efe9e0;--sand3:#e5ddd3;
  --ink:#1a1814;--ink2:#3d3a35;--ink3:#7a7570;
  --gold:#9a7d52;--gold2:#c4a272;--gold3:#e8d5b7;
  --white:#ffffff;
  --border:rgba(26,24,20,0.09);--border2:rgba(26,24,20,0.15);
  --green:#5cb87a;--red:#e05c5c;--blue:#5c8ae0;--purple:#8a5ce0;--orange:#e0905c;
  /* Status colors like Monday */
  --s-todo:#c4a272;--s-inprog:#5c8ae0;--s-done:#5cb87a;--s-stuck:#e05c5c;--s-review:#8a5ce0;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Jost',sans-serif;background:var(--sand);color:var(--ink);font-weight:300;overflow:hidden}

/* ── HEADER ── */
.header{height:54px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:0;position:fixed;top:0;left:0;right:0;z-index:100}
.logo{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:500;letter-spacing:.04em;text-decoration:none;color:var(--ink)}
.hdiv{width:1px;height:14px;background:var(--border2);margin:0 13px}
.hls{font-size:10px;color:var(--ink3);letter-spacing:.12em;text-transform:uppercase}
.hright{margin-left:auto;display:flex;align-items:center;gap:10px}
.back-btn{font-size:11px;color:var(--ink3);text-decoration:none;letter-spacing:.06em;padding:5px 10px;border:1px solid var(--border2);transition:all .12s}
.back-btn:hover{color:var(--ink);border-color:var(--gold)}

/* ── TOOLBAR ── */
.toolbar{position:fixed;top:54px;left:0;right:0;height:46px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:14px;z-index:99}
.view-tabs{display:flex;gap:2px}
.vtab{display:flex;align-items:center;gap:6px;padding:6px 13px;font-size:12px;letter-spacing:.04em;border:none;background:transparent;cursor:pointer;color:var(--ink3);border-bottom:2px solid transparent;transition:all .12s;font-family:'Jost',sans-serif;font-weight:400}
.vtab svg{width:14px;height:14px;opacity:.6}
.vtab.active{color:var(--gold);border-bottom-color:var(--gold)}
.vtab.active svg{opacity:1}
.vtab:hover:not(.active){color:var(--ink2)}
.tsep{width:1px;height:20px;background:var(--border2)}
.tbtn{display:flex;align-items:center;gap:5px;padding:5px 11px;font-size:11px;letter-spacing:.05em;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--ink2);font-family:'Jost',sans-serif;transition:all .12s}
.tbtn:hover{border-color:var(--gold);color:var(--gold)}
.tbtn.primary{background:var(--gold);color:var(--white);border-color:var(--gold)}
.tbtn.primary:hover{background:var(--gold2);border-color:var(--gold2)}
.search-box{display:flex;align-items:center;gap:7px;padding:5px 11px;border:1px solid var(--border2);background:var(--sand);font-size:11px;color:var(--ink3);font-family:'Jost',sans-serif;min-width:180px}
.search-box input{border:none;background:transparent;outline:none;font-family:'Jost',sans-serif;font-size:11px;color:var(--ink);width:100%}
.group-filter{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink3);margin-left:auto}
.group-filter select{border:1px solid var(--border2);background:transparent;font-family:'Jost',sans-serif;font-size:11px;color:var(--ink2);padding:4px 8px;outline:none;cursor:pointer}

/* ── MAIN ── */
.main{position:fixed;top:100px;left:0;right:0;bottom:0;overflow:auto}

/* ── BOARD VIEW ── */
#view-board{display:flex;gap:16px;padding:20px 22px;min-height:100%;align-items:flex-start}
.board-col{width:270px;flex-shrink:0}
.col-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:0 4px}
.col-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.col-title{font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--ink2)}
.col-count{font-size:11px;color:var(--ink3);margin-left:auto}
.col-add{font-size:11px;color:var(--ink3);background:none;border:none;cursor:pointer;padding:2px 4px;font-family:'Jost',sans-serif}
.col-add:hover{color:var(--gold)}
.col-body{display:flex;flex-direction:column;gap:8px;min-height:60px}
.task-card{background:var(--white);border:1px solid var(--border);padding:12px 14px;cursor:pointer;transition:all .12s;position:relative}
.task-card:hover{border-color:var(--gold3);box-shadow:0 2px 10px rgba(0,0,0,.07)}
.task-card.dragging{opacity:.5}
.task-card.drag-over{border-color:var(--gold);background:rgba(154,125,82,.04)}
.tc-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.tc-title{font-size:13px;font-weight:400;color:var(--ink);line-height:1.4;flex:1}
.tc-prio{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.tc-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tc-tag{font-size:10px;padding:2px 7px;letter-spacing:.04em;background:var(--sand2)}
.tc-client{font-size:10px;color:var(--gold);letter-spacing:.04em}
.tc-date{font-size:10px;color:var(--ink3);margin-left:auto}
.tc-av{width:20px;height:20px;border-radius:2px;font-size:8px;font-weight:500;display:flex;align-items:center;justify-content:center;letter-spacing:.04em;flex-shrink:0}
.col-drop-zone{border:2px dashed var(--border);padding:16px;text-align:center;font-size:11px;color:var(--ink3);border-radius:0}
.col-drop-zone.over{border-color:var(--gold);background:rgba(154,125,82,.04)}
.add-task-inline{display:flex;align-items:center;gap:7px;padding:9px 12px;border:1px dashed var(--border2);background:transparent;cursor:pointer;font-size:12px;color:var(--ink3);font-family:'Jost',sans-serif;width:100%;transition:all .12s;margin-top:4px}
.add-task-inline:hover{border-color:var(--gold);color:var(--gold)}

/* ── TABLE VIEW ── */
#view-table{padding:0}
.table-group{margin-bottom:0}
.tg-header{display:flex;align-items:center;gap:8px;padding:10px 22px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.tg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tg-title{font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.tg-count{font-size:11px;color:var(--ink3)}
.tg-toggle{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:12px;margin-right:4px}
.table-head{display:grid;grid-template-columns:32px 1fr 120px 120px 100px 120px 80px;align-items:center;padding:0 22px;height:36px;background:var(--sand2);border-bottom:1px solid var(--border);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);position:sticky;top:41px;z-index:9}
.table-head span{cursor:pointer}
.table-head span:hover{color:var(--ink)}
.table-row{display:grid;grid-template-columns:32px 1fr 120px 120px 100px 120px 80px;align-items:center;padding:0 22px;height:42px;border-bottom:1px solid var(--border);background:var(--white);transition:background .1s;cursor:pointer}
.table-row:hover{background:var(--sand)}
.table-row .tr-check{width:16px;height:16px;border:1.5px solid var(--border2);cursor:pointer;accent-color:var(--gold)}
.tr-title{font-size:13px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:12px}
.tr-status{display:inline-flex}
.status-pill{font-size:10px;padding:3px 9px;letter-spacing:.06em;font-weight:500;color:var(--white);white-space:nowrap}
.tr-assign{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink2)}
.tr-client{font-size:11px;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-date{font-size:11px;color:var(--ink3)}
.tr-prio .prio-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.add-row-btn{display:flex;align-items:center;gap:7px;padding:10px 22px;font-size:12px;color:var(--ink3);cursor:pointer;background:var(--white);border-bottom:1px solid var(--border);font-family:'Jost',sans-serif}
.add-row-btn:hover{color:var(--gold)}

/* ── CALENDAR VIEW ── */
#view-calendar{padding:20px 22px}
.cal-nav{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.cal-nav h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400}
.cal-arrow{background:none;border:1px solid var(--border2);width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--ink2);transition:all .12s}
.cal-arrow:hover{border-color:var(--gold);color:var(--gold)}
.cal-today-btn{font-size:11px;padding:4px 12px;border:1px solid var(--border2);background:transparent;cursor:pointer;font-family:'Jost',sans-serif;color:var(--ink2);letter-spacing:.06em;transition:all .12s}
.cal-today-btn:hover{border-color:var(--gold);color:var(--gold)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border-top:1px solid var(--border);border-left:1px solid var(--border)}
.cal-day-name{text-align:center;padding:8px 0;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--sand2)}
.cal-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:110px;padding:6px;background:var(--white);vertical-align:top;position:relative}
.cal-cell.other-month{background:var(--sand)}
.cal-cell.today{background:rgba(154,125,82,.04)}
.cal-cell.today .cal-date{color:var(--gold);font-weight:500}
.cal-date{font-size:11px;color:var(--ink3);margin-bottom:4px}
.cal-task{font-size:10px;padding:2px 6px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--white)}
.cal-task:hover{opacity:.85}
.cal-more{font-size:10px;color:var(--ink3);padding:1px 4px;cursor:pointer}
.cal-more:hover{color:var(--gold)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(26,24,20,.35);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--white);width:540px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.18);position:relative}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;flex:1}
.modal-close{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:18px;line-height:1}
.modal-close:hover{color:var(--ink)}
.modal-body{padding:20px 24px}
.form-row{margin-bottom:16px}
.form-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;display:block}
.form-input{width:100%;padding:9px 12px;border:1px solid var(--border2);background:var(--sand);font-family:'Jost',sans-serif;font-size:13px;color:var(--ink);outline:none;transition:border-color .12s}
.form-input:focus{border-color:var(--gold)}
.form-select{width:100%;padding:9px 12px;border:1px solid var(--border2);background:var(--sand);font-family:'Jost',sans-serif;font-size:13px;color:var(--ink);outline:none;cursor:pointer}
.form-select:focus{border-color:var(--gold)}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-textarea{width:100%;padding:9px 12px;border:1px solid var(--border2);background:var(--sand);font-family:'Jost',sans-serif;font-size:13px;color:var(--ink);outline:none;resize:vertical;min-height:80px}
.form-textarea:focus{border-color:var(--gold)}
.modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.btn-cancel{padding:8px 18px;border:1px solid var(--border2);background:transparent;font-family:'Jost',sans-serif;font-size:12px;color:var(--ink2);cursor:pointer;letter-spacing:.06em}
.btn-cancel:hover{border-color:var(--ink)}
.btn-save{padding:8px 18px;background:var(--gold);border:1px solid var(--gold);color:var(--white);font-family:'Jost',sans-serif;font-size:12px;cursor:pointer;letter-spacing:.06em}
.btn-save:hover{background:var(--gold2)}

/* Task detail modal */
.detail-status-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.ds-btn{padding:6px 14px;font-size:11px;letter-spacing:.06em;border:1px solid transparent;cursor:pointer;font-family:'Jost',sans-serif;font-weight:500;color:var(--white);transition:opacity .12s}
.ds-btn:hover{opacity:.85}
.ds-btn.selected{outline:2px solid var(--ink);outline-offset:1px}
.detail-field{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.detail-field:last-child{border-bottom:none}
.df-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);width:100px;flex-shrink:0}
.df-val{font-size:13px;color:var(--ink2);flex:1}
.df-edit{font-size:11px;color:var(--ink3);background:none;border:none;cursor:pointer;padding:2px 6px}
.df-edit:hover{color:var(--gold)}
.activity-section{margin-top:20px}
.activity-title{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:12px}
.activity-item{display:flex;gap:10px;margin-bottom:12px;font-size:12px;color:var(--ink2);line-height:1.5}
.activity-av{width:24px;height:24px;border-radius:2px;font-size:9px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--white)}
.activity-time{font-size:10px;color:var(--ink3)}
.add-comment{display:flex;gap:10px;margin-top:12px}
.add-comment input{flex:1;padding:8px 12px;border:1px solid var(--border2);background:var(--sand);font-family:'Jost',sans-serif;font-size:12px;color:var(--ink);outline:none}
.add-comment input:focus{border-color:var(--gold)}
.add-comment button{padding:8px 14px;background:var(--gold);border:none;color:var(--white);font-family:'Jost',sans-serif;font-size:11px;cursor:pointer}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <a href="/agent.html" class="logo">Two Travel</a>
  <div class="hdiv"></div>
  <span class="hls">Tasks</span>
  <div class="hright">
    <a href="/menu.html" class="back-btn">← Menú</a>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="view-tabs">
    <button class="vtab active" onclick="switchView('board')" id="tab-board">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="4" height="14"/><rect x="6" y="1" width="4" height="14"/><rect x="11" y="1" width="4" height="14"/></svg>
      Board
    </button>
    <button class="vtab" onclick="switchView('table')" id="tab-table">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="14" height="14"/><line x1="1" y1="5" x2="15" y2="5"/><line x1="1" y1="9" x2="15" y2="9"/><line x1="1" y1="13" x2="15" y2="13"/></svg>
      Table
    </button>
    <button class="vtab" onclick="switchView('calendar')" id="tab-calendar">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="2" width="14" height="13"/><line x1="1" y1="6" x2="15" y2="6"/><line x1="5" y1="1" x2="5" y2="4"/><line x1="11" y1="1" x2="11" y2="4"/></svg>
      Calendar
    </button>
  </div>
  <div class="tsep"></div>
  <button class="tbtn" onclick="openNewTask()">+ New Task</button>
  <div style="display:flex;gap:4px;margin:0 4px">
    <button id="cat-all" onclick="setCatFilter('all')" style="padding:4px 10px;font-size:11px;border:1px solid var(--border2);border-radius:5px;background:var(--ink);color:#fff;cursor:pointer">Todas</button>
    <button id="cat-concierge" onclick="setCatFilter('concierge')" style="padding:4px 10px;font-size:11px;border:1px solid var(--border2);border-radius:5px;background:transparent;color:var(--ink);cursor:pointer">Concierge</button>
    <button id="cat-ventas" onclick="setCatFilter('ventas')" style="padding:4px 10px;font-size:11px;border:1px solid var(--border2);border-radius:5px;background:transparent;color:var(--ink);cursor:pointer">Ventas</button>
  </div>
  <div class="search-box">
    <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="5"/><line x1="10" y1="10" x2="15" y2="15"/></svg>
    <input type="text" placeholder="Search tasks..." oninput="filterTasks(this.value)" id="search-input">
  </div>
  <div class="group-filter">
    <span style="font-size:11px;color:var(--ink3)">Group by</span>
    <select onchange="regroupBy(this.value)">
      <option value="status">Status</option>
      <option value="assignee">Assignee</option>
      <option value="priority">Priority</option>
    </select>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main">

  <!-- BOARD VIEW -->
  <div id="view-board">
    <!-- generated by JS -->
  </div>

  <!-- TABLE VIEW -->
  <div id="view-table" style="display:none">
    <div class="table-head">
      <span></span>
      <span onclick="sortBy('title')">Task</span>
      <span onclick="sortBy('status')">Status</span>
      <span onclick="sortBy('assignee')">Assignee</span>
      <span onclick="sortBy('client')">Client</span>
      <span onclick="sortBy('due')">Due Date</span>
      <span onclick="sortBy('priority')">Priority</span>
    </div>
    <div id="table-body"></div>
  </div>

  <!-- CALENDAR VIEW -->
  <div id="view-calendar" style="display:none">
    <div class="cal-nav">
      <button class="cal-arrow" onclick="calPrev()">‹</button>
      <button class="cal-arrow" onclick="calNext()">›</button>
      <h2 id="cal-title"></h2>
      <button class="cal-today-btn" onclick="calToday()">Today</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

</div>

<!-- NEW TASK MODAL -->
<div class="modal-overlay" id="modal-new" onclick="closeModalNew(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title">New Task</div>
      <button class="modal-close" onclick="closeModalNew()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label class="form-label">Task Title</label>
        <input class="form-input" id="new-title" placeholder="What needs to be done?" />
      </div>
      <div class="form-row-2">
        <div class="form-row" style="margin-bottom:0">
          <label class="form-label">Status</label>
          <select class="form-select" id="new-status">
            <option value="todo">To Do</option>
            <option value="inprog">In Progress</option>
            <option value="review">In Review</option>
            <option value="stuck">Stuck</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div class="form-row" style="margin-bottom:0">
          <label class="form-label">Priority</label>
          <select class="form-select" id="new-priority">
            <option value="medium">Medium</option>
            <option value="high">High</option>
            <option value="low">Low</option>
            <option value="critical">Critical</option>
          </select>
        </div>
      </div>
      <div class="form-row-2" style="margin-top:16px">
        <div class="form-row" style="margin-bottom:0">
          <label class="form-label">Assigned To</label>
          <select class="form-select" id="new-assignee">
            <option value="">— Unassigned —</option>
            <option value="Ray">Ray</option>
            <option value="Ross">Ross</option>
            <option value="Maria">Maria</option>
            <option value="Jerome">Jerome</option>
            <option value="Michel">Michel</option>
            <option value="Alia">Alia</option>
          </select>
        </div>
        <div class="form-row" style="margin-bottom:0">
          <label class="form-label">Due Date</label>
          <input class="form-input" type="date" id="new-due" />
        </div>
      </div>
      <div class="form-row-2" style="margin-top:16px">
        <div class="form-row" style="margin-bottom:0">
          <label class="form-label">Area</label>
          <select class="form-select" id="new-category">
            <option value="concierge">Concierge</option>
            <option value="ventas">Ventas</option>
          </select>
        </div>
        <div class="form-row" style="margin-bottom:0">
          <label class="form-label">Client (optional)</label>
          <input class="form-input" id="new-client" placeholder="e.g. Nick Soni" />
        </div>
      </div>
      <div class="form-row" style="margin-top:12px">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="new-notes" placeholder="Add more context..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModalNew()">Cancel</button>
      <button class="btn-save" onclick="saveNewTask()">Create Task</button>
    </div>
  </div>
</div>

<!-- TASK DETAIL MODAL -->
<div class="modal-overlay" id="modal-detail" onclick="closeDetail(event)">
  <div class="modal" onclick="event.stopPropagation()" style="width:580px">
    <div class="modal-header">
      <div class="modal-title" id="detail-title-text" contenteditable="true" style="outline:none;min-width:100px"></div>
      <button class="modal-close" onclick="closeDetail()">×</button>
    </div>
    <div class="modal-body">
      <!-- Status bar -->
      <div class="detail-status-bar" id="detail-status-bar"></div>
      <!-- Fields -->
      <div id="detail-fields"></div>
      <!-- Activity -->
      <div class="activity-section">
        <div class="activity-title">Activity</div>
        <div id="detail-activity"></div>
        <div class="add-comment">
          <input type="text" id="comment-input" placeholder="Write a comment..." onkeydown="if(event.key==='Enter')addComment()" />
          <button onclick="addComment()">Send</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="deleteTask(); closeDetail()" style="color:var(--red);border-color:var(--red)">Delete</button>
      <button class="btn-cancel" onclick="closeDetail()">Cancel</button>
      <button class="btn-save" onclick="saveDetail()">Save</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwVj2nl99gFJB0ZeFIm_WrS2TepT2mu3m-tAoEy0Wc5-oO9Rj33i16nAp0jFBqLSI665A/exec';

const STATUSES = {
  todo:   {label:'To Do',     color:'#c4a272'},
  inprog: {label:'In Progress',color:'#5c8ae0'},
  review: {label:'In Review', color:'#8a5ce0'},
  stuck:  {label:'Stuck',     color:'#e05c5c'},
  done:   {label:'Done',      color:'#5cb87a'},
};
const PRIORITIES = {
  critical:{label:'Critical',color:'#e05c5c'},
  high:    {label:'High',    color:'#e0905c'},
  medium:  {label:'Medium',  color:'#c4a272'},
  low:     {label:'Low',     color:'#7a7570'},
};
const AG = {
  Ray:    {bg:'#2d2d2d',c:'#fff',i:'RA'},
  Ross:   {bg:'#3d5a3e',c:'#fff',i:'RO'},
  Maria:  {bg:'#5a3d3d',c:'#fff',i:'MA'},
  Jerome: {bg:'#3d3d5a',c:'#fff',i:'JE'},
  Michel: {bg:'#9a7d52',c:'#fff',i:'MI'},
  Alia:   {bg:'#5a4a3d',c:'#fff',i:'AL'},
};

let tasks = [];
let currentView = 'board';
let detailId = null;
let calDate = new Date();
let groupMode = 'status';
let searchQ = '';
let catFilter = 'all';

function setCatFilter(v){
  catFilter = v;
  ['all','concierge','ventas'].forEach(k => {
    const b = document.getElementById('cat-'+k);
    if(b){ b.style.background = k===v ? 'var(--ink)' : 'transparent'; b.style.color = k===v ? '#fff' : 'var(--ink)'; }
  });
  render();
}

/* ── STORAGE ── */
function saveTasks(){
  localStorage.setItem('tt_tasks', JSON.stringify(tasks));
  // Optionally sync to GAS
  syncToGAS();
}
function loadTasks(){
  const saved = localStorage.getItem('tt_tasks');
  if(saved){ try{ tasks=JSON.parse(saved); }catch{} }
  if(!tasks.length) tasks = getSampleTasks();
}
async function syncToGAS(){
  try{
    await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'saveTasks',data:{tasks}})});
  }catch{}
}
async function loadFromGAS(){
  try{
    const r = await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'getTasks'})});
    const d = await r.json();
    if(d.data?.length){ tasks=d.data; localStorage.setItem('tt_tasks',JSON.stringify(tasks)); }
  }catch{}
}

function getSampleTasks(){
  const today = new Date();
  const fmt = d => d.toISOString().split('T')[0];
  const add = n => { const d=new Date(today); d.setDate(d.getDate()+n); return fmt(d); };
  return [
    {id:'t1',title:'Send villa options to Nick Soni',status:'inprog',priority:'high',assignee:'Ray',client:'Nick Soni — Mexico City',due:add(1),notes:'Client waiting for 3 villa options under $5k/night',activity:[{by:'Ray',text:'Started researching options',time:new Date().toISOString()}]},
    {id:'t2',title:'Follow up with Tshepiso Moeketsi',status:'todo',priority:'medium',assignee:'Ray',client:'Tshepiso Moeketsi — CDMX',due:add(2),notes:'',activity:[]},
    {id:'t3',title:'Confirm CTG yacht booking for Morgan Lewis',status:'review',priority:'high',assignee:'Ross',client:'Morgan Lewis — CTG',due:add(0),notes:'Need confirmation from captain',activity:[]},
    {id:'t4',title:'Send Medellin villa proposals',status:'todo',priority:'medium',assignee:'Ross',client:'Pablo Pelaez — Medellín',due:add(3),notes:'',activity:[]},
    {id:'t5',title:'Update property PDF links in admin',status:'done',priority:'low',assignee:'Michel',client:'',due:add(-1),notes:'',activity:[{by:'Michel',text:'Completed all PDF updates',time:new Date().toISOString()}]},
    {id:'t6',title:'Create welcome kit for Amelia Walker',status:'stuck',priority:'critical',assignee:'Ray',client:'Amelia Walker — CDMX',due:add(-1),notes:'Missing flight info from client',activity:[]},
    {id:'t7',title:'Weekly pipeline review',status:'todo',priority:'medium',assignee:'Alia',client:'',due:add(5),notes:'All agents to join Monday 10am',activity:[]},
    {id:'t8',title:'Onboard new CTG property',status:'inprog',priority:'medium',assignee:'Ross',client:'',due:add(4),notes:'Add to admin + portfolio',activity:[]},
  ];
}

/* ── VIEWS ── */
function switchView(v){
  currentView = v;
  ['board','table','calendar'].forEach(x=>{
    document.getElementById('view-'+x).style.display = x===v ? (x==='board'?'flex':'block') : 'none';
    document.getElementById('tab-'+x).classList.toggle('active', x===v);
  });
  render();
}

function render(){
  if(currentView==='board') renderBoard();
  else if(currentView==='table') renderTable();
  else renderCalendar();
}

function filterTasks(q){ searchQ=q.toLowerCase(); render(); }
function sortBy(col){ /* simple sort */ tasks.sort((a,b)=>(a[col]||'').localeCompare(b[col]||'')); render(); }
function regroupBy(val){ groupMode=val; render(); }

function visibleTasks(){
  return tasks.filter(t=>{
    if(catFilter !== 'all' && (t.category||'concierge') !== catFilter) return false;
    if(!searchQ) return true;
    return t.title.toLowerCase().includes(searchQ)||
      (t.client||'').toLowerCase().includes(searchQ)||
      (t.assignee||'').toLowerCase().includes(searchQ);
  });
}

/* ── BOARD ── */
function renderBoard(){
  const el = document.getElementById('view-board');
  const cols = Object.entries(STATUSES);
  const vis = visibleTasks();
  el.innerHTML = cols.map(([key,s])=>{
    const colTasks = vis.filter(t=>t.status===key);
    return `<div class="board-col" id="col-${key}" ondragover="dragOver(event,'${key}')" ondrop="drop(event,'${key}')" ondragleave="dragLeave(event)">
      <div class="col-header">
        <div class="col-dot" style="background:${s.color}"></div>
        <div class="col-title">${s.label}</div>
        <span class="col-count">${colTasks.length}</span>
      </div>
      <div class="col-body" id="colbody-${key}">
        ${colTasks.map(t=>taskCard(t)).join('')}
      </div>
      <button class="add-task-inline" onclick="openNewTask('${key}')">+ Add Task</button>
    </div>`;
  }).join('');
}

function taskCard(t){
  const s = STATUSES[t.status]||STATUSES.todo;
  const p = PRIORITIES[t.priority]||PRIORITIES.medium;
  const ag = AG[t.assignee]||{bg:'#ccc',c:'#fff',i:(t.assignee||'?').substring(0,2).toUpperCase()};
  const due = t.due ? formatDue(t.due) : '';
  const overdue = t.due && new Date(t.due) < new Date() && t.status!=='done';
  return `<div class="task-card" draggable="true" ondragstart="dragStart(event,'${t.id}')" onclick="openDetail('${t.id}')">
    <div class="tc-top">
      <div class="tc-title">${esc(t.title)}</div>
      <div class="tc-prio" style="background:${p.color}" title="${p.label}"></div>
    </div>
    <div class="tc-meta">
      ${t.client?`<span class="tc-client">✦ ${esc(t.client)}</span>`:''}
      ${t.assignee?`<div class="tc-av" style="background:${ag.bg};color:${ag.c}">${ag.i}</div>`:''}
      ${due?`<span class="tc-date" style="${overdue?'color:var(--red)':''}">${overdue?'⚠ ':''}${due}</span>`:''}
    </div>
  </div>`;
}

/* ── TABLE ── */
function renderTable(){
  const vis = visibleTasks();
  const groups = groupMode==='status' ? Object.keys(STATUSES)
               : groupMode==='assignee' ? [...new Set(vis.map(t=>t.assignee||'Unassigned'))]
               : Object.keys(PRIORITIES);

  let html = '';
  groups.forEach(gk=>{
    let gTasks, gLabel, gColor;
    if(groupMode==='status'){
      gTasks = vis.filter(t=>t.status===gk);
      gLabel = STATUSES[gk].label; gColor = STATUSES[gk].color;
    } else if(groupMode==='assignee'){
      gTasks = vis.filter(t=>(t.assignee||'Unassigned')===gk);
      gLabel = gk; gColor = AG[gk]?.bg||'#999';
    } else {
      gTasks = vis.filter(t=>t.priority===gk);
      gLabel = PRIORITIES[gk]?.label||gk; gColor = PRIORITIES[gk]?.color||'#999';
    }
    if(!gTasks.length) return;
    html += `<div class="table-group">
      <div class="tg-header" style="border-left:3px solid ${gColor}">
        <div class="tg-dot" style="background:${gColor}"></div>
        <div class="tg-title">${gLabel}</div>
        <div class="tg-count">${gTasks.length}</div>
      </div>
      ${gTasks.map(t=>tableRow(t)).join('')}
      <div class="add-row-btn" onclick="openNewTask('${gk}')">+ Add Task</div>
    </div>`;
  });
  document.getElementById('table-body').innerHTML = html;
}

function tableRow(t){
  const s = STATUSES[t.status]||STATUSES.todo;
  const p = PRIORITIES[t.priority]||PRIORITIES.medium;
  const ag = AG[t.assignee]||{bg:'#ccc',c:'#fff',i:(t.assignee||'?').substring(0,2).toUpperCase()};
  const overdue = t.due && new Date(t.due) < new Date() && t.status!=='done';
  return `<div class="table-row" onclick="openDetail('${t.id}')">
    <input type="checkbox" class="tr-check" onclick="event.stopPropagation();toggleDone('${t.id}')" ${t.status==='done'?'checked':''}>
    <div class="tr-title" style="${t.status==='done'?'text-decoration:line-through;color:var(--ink3)':''}">${esc(t.title)}</div>
    <div class="tr-status"><span class="status-pill" style="background:${s.color}">${s.label}</span></div>
    <div class="tr-assign">
      ${t.assignee?`<div class="tc-av" style="background:${ag.bg};color:${ag.c};width:20px;height:20px;border-radius:2px;font-size:8px;font-weight:500;display:inline-flex;align-items:center;justify-content:center">${ag.i}</div> ${t.assignee}`:'-'}
    </div>
    <div class="tr-client">${esc(t.client||'-')}</div>
    <div class="tr-date" style="${overdue?'color:var(--red)':''}">
      ${t.due ? (overdue?'⚠ ':'')+formatDue(t.due) : '-'}
    </div>
    <div class="tr-prio"><span class="prio-dot" style="background:${p.color}"></span> ${p.label}</div>
  </div>`;
}

/* ── CALENDAR ── */
function renderCalendar(){
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-title').textContent = `${months[calDate.getMonth()]} ${calDate.getFullYear()}`;
  const grid = document.getElementById('cal-grid');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html = days.map(d=>`<div class="cal-day-name">${d}</div>`).join('');

  const y=calDate.getFullYear(), m=calDate.getMonth();
  const first = new Date(y,m,1).getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const daysInPrev = new Date(y,m,0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  const totalCells = Math.ceil((first+daysInMonth)/7)*7;
  const vis = visibleTasks();

  for(let i=0;i<totalCells;i++){
    let date, other=false;
    if(i<first){ date=new Date(y,m-1,daysInPrev-first+i+1); other=true; }
    else if(i>=first+daysInMonth){ date=new Date(y,m+1,i-first-daysInMonth+1); other=true; }
    else{ date=new Date(y,m,i-first+1); }

    const isToday = date.getTime()===today.getTime();
    const dateStr = date.toISOString().split('T')[0];
    const dayTasks = vis.filter(t=>t.due===dateStr);
    const max=3;

    html += `<div class="cal-cell ${other?'other-month':''} ${isToday?'today':''}">
      <div class="cal-date">${date.getDate()}</div>
      ${dayTasks.slice(0,max).map(t=>{
        const s=STATUSES[t.status]||STATUSES.todo;
        return `<div class="cal-task" style="background:${s.color}" onclick="openDetail('${t.id}')" title="${esc(t.title)}">${esc(t.title)}</div>`;
      }).join('')}
      ${dayTasks.length>max?`<div class="cal-more">+${dayTasks.length-max} more</div>`:''}
    </div>`;
  }
  grid.innerHTML = html;
}
function calPrev(){ calDate=new Date(calDate.getFullYear(),calDate.getMonth()-1,1); renderCalendar(); }
function calNext(){ calDate=new Date(calDate.getFullYear(),calDate.getMonth()+1,1); renderCalendar(); }
function calToday(){ calDate=new Date(); renderCalendar(); }

/* ── DRAG & DROP ── */
let dragId=null;
function dragStart(e,id){ dragId=id; e.target.classList.add('dragging'); }
function dragOver(e,col){
  e.preventDefault();
  document.querySelectorAll('.board-col').forEach(c=>c.classList.remove('drag-over'));
  document.getElementById('col-'+col)?.classList.add('drag-over');
}
function dragLeave(e){ e.currentTarget.classList.remove('drag-over'); }
function drop(e,col){
  e.preventDefault();
  document.querySelectorAll('.board-col').forEach(c=>c.classList.remove('drag-over'));
  if(dragId){
    const t = tasks.find(x=>x.id===dragId);
    if(t){ t.status=col; saveTasks(); render(); }
    dragId=null;
  }
}

/* ── NEW TASK ── */
function openNewTask(status='todo'){
  document.getElementById('new-title').value='';
  document.getElementById('new-status').value=status in STATUSES ? status : 'todo';
  document.getElementById('new-priority').value='medium';
  document.getElementById('new-assignee').value='';
  document.getElementById('new-due').value='';
  document.getElementById('new-client').value='';
  document.getElementById('new-notes').value='';
  document.getElementById('modal-new').classList.add('open');
  setTimeout(()=>document.getElementById('new-title').focus(),100);
}
function closeModalNew(e){ if(!e||e.target===document.getElementById('modal-new')) document.getElementById('modal-new').classList.remove('open'); }
function saveNewTask(){
  const title = document.getElementById('new-title').value.trim();
  if(!title) return;
  const t = {
    id: 't'+Date.now(),
    title,
    status: document.getElementById('new-status').value,
    priority: document.getElementById('new-priority').value,
    assignee: document.getElementById('new-assignee').value,
    due: document.getElementById('new-due').value,
    category: document.getElementById('new-category').value,
    client: document.getElementById('new-client').value.trim(),
    notes: document.getElementById('new-notes').value.trim(),
    activity: [{by:'System',text:'Task created',time:new Date().toISOString()}],
  };
  tasks.unshift(t);
  saveTasks(); render();
  document.getElementById('modal-new').classList.remove('open');
}

/* ── DETAIL ── */
function openDetail(id){
  detailId = id;
  const t = tasks.find(x=>x.id===id);
  if(!t) return;
  document.getElementById('detail-title-text').textContent = t.title;

  // Status bar
  const bar = document.getElementById('detail-status-bar');
  bar.innerHTML = Object.entries(STATUSES).map(([k,s])=>
    `<button class="ds-btn ${t.status===k?'selected':''}" style="background:${s.color}" onclick="setDetailStatus('${k}',this)">${s.label}</button>`
  ).join('');

  // Fields
  const ag = AG[t.assignee]||{bg:'#ccc',c:'#fff',i:(t.assignee||'?').substring(0,2).toUpperCase()};
  document.getElementById('detail-fields').innerHTML = `
    <div class="detail-field">
      <div class="df-label">Assigned to</div>
      <div class="df-val">
        ${t.assignee?`<span style="display:inline-flex;align-items:center;gap:6px"><span style="width:20px;height:20px;background:${ag.bg};color:${ag.c};font-size:8px;font-weight:500;display:inline-flex;align-items:center;justify-content:center">${ag.i}</span> ${t.assignee}</span>`:'—'}
      </div>
      <select class="form-select" style="width:auto;font-size:11px;padding:4px 8px" onchange="tasks.find(x=>x.id==='${id}').assignee=this.value;renderDetail()">
        ${Object.keys(AG).map(a=>`<option value="${a}" ${t.assignee===a?'selected':''}>${a}</option>`).join('')}
        <option value="" ${!t.assignee?'selected':''}>Unassigned</option>
      </select>
    </div>
    <div class="detail-field">
      <div class="df-label">Priority</div>
      <div class="df-val"><span style="display:inline-flex;align-items:center;gap:6px"><span style="width:10px;height:10px;border-radius:50%;background:${(PRIORITIES[t.priority]||PRIORITIES.medium).color};display:inline-block"></span>${(PRIORITIES[t.priority]||PRIORITIES.medium).label}</span></div>
      <select class="form-select" style="width:auto;font-size:11px;padding:4px 8px" onchange="tasks.find(x=>x.id==='${id}').priority=this.value;renderDetail()">
        ${Object.entries(PRIORITIES).map(([k,p])=>`<option value="${k}" ${t.priority===k?'selected':''}>${p.label}</option>`).join('')}
      </select>
    </div>
    <div class="detail-field">
      <div class="df-label">Due Date</div>
      <div class="df-val">${t.due||'—'}</div>
      <input type="date" class="form-input" style="width:auto;font-size:11px;padding:4px 8px" value="${t.due||''}" onchange="tasks.find(x=>x.id==='${id}').due=this.value;renderDetail()">
    </div>
    <div class="detail-field">
      <div class="df-label">Client</div>
      <div class="df-val" style="color:var(--gold)">${t.client||'—'}</div>
      <input class="form-input" style="width:200px;font-size:11px;padding:4px 8px" value="${esc(t.client||'')}" oninput="tasks.find(x=>x.id==='${id}').client=this.value" placeholder="Client name">
    </div>
    <div class="detail-field" style="flex-direction:column;align-items:flex-start;gap:6px">
      <div class="df-label">Notes</div>
      <textarea class="form-textarea" style="width:100%;min-height:60px;font-size:12px" oninput="tasks.find(x=>x.id==='${id}').notes=this.value">${esc(t.notes||'')}</textarea>
    </div>
  `;

  // Activity
  renderActivity(t);
  document.getElementById('comment-input').value='';
  document.getElementById('modal-detail').classList.add('open');
}
function renderActivity(t){
  const el = document.getElementById('detail-activity');
  if(!t.activity?.length){ el.innerHTML='<div style="font-size:12px;color:var(--ink3)">No activity yet.</div>'; return; }
  el.innerHTML = t.activity.slice().reverse().map(a=>{
    const ag2 = AG[a.by]||{bg:'#999',c:'#fff',i:(a.by||'?').substring(0,2).toUpperCase()};
    const time = a.time ? new Date(a.time).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
    return `<div class="activity-item">
      <div class="activity-av" style="background:${ag2.bg}">${ag2.i}</div>
      <div><span style="font-weight:500">${a.by}</span> — ${a.text} <span class="activity-time">${time}</span></div>
    </div>`;
  }).join('');
}
function renderDetail(){ openDetail(detailId); }
function setDetailStatus(s,btn){
  const t=tasks.find(x=>x.id===detailId); if(t){ t.status=s; }
  document.querySelectorAll('.ds-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}
function addComment(){
  const input = document.getElementById('comment-input');
  const text = input.value.trim(); if(!text) return;
  const t = tasks.find(x=>x.id===detailId); if(!t) return;
  if(!t.activity) t.activity=[];
  t.activity.push({by:'You',text,time:new Date().toISOString()});
  input.value='';
  renderActivity(t);
}
function deleteTask(){
  tasks = tasks.filter(x=>x.id!==detailId);
  saveTasks(); render();
}
function saveDetail(){
  const t=tasks.find(x=>x.id===detailId); if(!t) return;
  t.title = document.getElementById('detail-title-text').textContent.trim() || t.title;
  if(!t.activity) t.activity=[];
  t.activity.push({by:'You',text:'Task updated',time:new Date().toISOString()});
  saveTasks(); render();
  document.getElementById('modal-detail').classList.remove('open');
}
function closeDetail(e){ if(!e||!e.target||e.target===document.getElementById('modal-detail')) document.getElementById('modal-detail').classList.remove('open'); }

/* ── HELPERS ── */
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toggleDone(id){ const t=tasks.find(x=>x.id===id); if(t){ t.status=t.status==='done'?'todo':'done'; saveTasks(); render(); }}
function formatDue(d){
  const dt=new Date(d+'T12:00:00'); const now=new Date(); now.setHours(0,0,0,0);
  const diff=Math.round((dt-now)/(1000*60*60*24));
  if(diff===0) return 'Today';
  if(diff===1) return 'Tomorrow';
  if(diff===-1) return 'Yesterday';
  if(diff<0) return `${Math.abs(diff)}d ago`;
  if(diff<7) return `In ${diff}d`;
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

/* ── INIT ── */
loadTasks();
render(); // render immediately from localStorage
loadFromGAS().then(()=>{ if(tasks.length) render(); }).catch(()=>{});
</script>
