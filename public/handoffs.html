<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Two Travel · Handoffs Operaciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --sand:#f7f4ef;--sand2:#efe9e0;--sand3:#e5ddd3;
  --ink:#1a1814;--ink2:#3d3a35;--ink3:#7a7570;
  --gold:#9a7d52;--gold2:#c4a272;--gold3:#e8d5b7;
  --white:#ffffff;
  --border:rgba(26,24,20,0.09);--border2:rgba(26,24,20,0.15);
  --s-todo:#aaaaaa;--s-inprog:#5c8ae0;--s-cobrar:#e0905c;--s-cancel:#e0c05c;--s-done:#5cb87a;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Jost',sans-serif;background:var(--sand);color:var(--ink);font-weight:300;overflow:hidden}

.header{height:54px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:0;position:fixed;top:0;left:0;right:0;z-index:100}
.logo{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:500;letter-spacing:.04em;text-decoration:none;color:var(--ink)}
.hdiv{width:1px;height:14px;background:var(--border2);margin:0 13px}
.hls{font-size:10px;color:var(--ink3);letter-spacing:.12em;text-transform:uppercase}
.hright{margin-left:auto;display:flex;align-items:center;gap:10px}
.back-btn{font-size:11px;color:var(--ink3);text-decoration:none;letter-spacing:.06em;padding:5px 10px;border:1px solid var(--border2);transition:all .12s}
.back-btn:hover{color:var(--ink);border-color:var(--gold)}

.toolbar{position:fixed;top:54px;left:0;right:0;height:46px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:10px;z-index:99}
.tbtn{display:flex;align-items:center;gap:5px;padding:5px 12px;font-size:11px;letter-spacing:.05em;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--ink2);font-family:'Jost',sans-serif;transition:all .12s;white-space:nowrap}
.tbtn:hover{border-color:var(--gold);color:var(--gold)}
.tbtn.primary{background:var(--gold);color:var(--white);border-color:var(--gold)}
.tbtn.primary:hover{background:var(--gold2);border-color:var(--gold2)}
.search-box{display:flex;align-items:center;gap:7px;padding:5px 11px;border:1px solid var(--border2);background:var(--sand);font-size:11px;color:var(--ink3);font-family:'Jost',sans-serif}
.search-box input{border:none;background:transparent;outline:none;font-family:'Jost',sans-serif;font-size:11px;color:var(--ink);width:140px}
.sync-info{margin-left:auto;font-size:10px;color:var(--ink3);letter-spacing:.04em}

.main{position:fixed;top:100px;left:0;right:0;bottom:0;overflow:auto;padding:20px 22px}

/* TABLE */
.week-group{margin-bottom:24px}
.week-header{display:flex;align-items:center;gap:8px;margin-bottom:0;padding:8px 12px;background:var(--white);border:1px solid var(--border);border-bottom:none;cursor:pointer;user-select:none}
.week-toggle{font-size:11px;color:var(--ink3);transition:transform .15s}
.week-toggle.open{transform:rotate(0deg)}
.week-toggle.closed{transform:rotate(-90deg)}
.week-label{font-size:12px;font-weight:500;letter-spacing:.04em;color:var(--ink2)}
.week-count{font-size:11px;color:var(--ink3);background:var(--sand2);padding:1px 7px;border-radius:10px}
.week-color{width:4px;height:18px;border-radius:2px;margin-right:2px}

.table-wrap{overflow-x:auto;border:1px solid var(--border);background:var(--white)}
.htable{width:100%;border-collapse:collapse;min-width:1200px}
.htable th{position:sticky;top:0;background:var(--sand);border-bottom:1px solid var(--border2);border-right:1px solid var(--border);padding:7px 10px;font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);white-space:nowrap;cursor:default}
.htable th:first-child{width:36px;text-align:center}
.htable td{border-bottom:1px solid var(--border);border-right:1px solid var(--border);padding:0;vertical-align:middle;height:38px;font-size:12px}
.htable td:last-child{border-right:none}
.htable tr:hover td{background:rgba(247,244,239,0.5)}
.htable tr.selected td{background:rgba(154,125,82,0.06)}

.cell{padding:6px 10px;min-height:38px;display:flex;align-items:center;cursor:pointer;height:100%}
.cell:hover{background:rgba(154,125,82,0.06)}
.cell.editing{padding:0}
.cell input,.cell select,.cell textarea{width:100%;border:none;outline:none;font-family:'Jost',sans-serif;font-size:12px;color:var(--ink);background:transparent;padding:6px 10px;height:38px}
.cell textarea{height:auto;min-height:38px;resize:none}

.row-check{width:36px;text-align:center;color:var(--ink3);font-size:16px;cursor:pointer;user-select:none}
.row-check input{cursor:pointer;accent-color:var(--gold)}

/* STATUS CHIP */
.status-chip{display:inline-flex;align-items:center;padding:3px 10px;font-size:11px;font-weight:400;letter-spacing:.04em;border-radius:2px;color:#fff;white-space:nowrap;cursor:pointer;min-width:90px;justify-content:center}
.status-wrap{display:flex;align-items:center;justify-content:center;padding:4px 6px}

/* PERSON AVATAR */
.person-chip{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:9px;font-weight:500;letter-spacing:.04em;color:#fff;flex-shrink:0}
.persons-cell{display:flex;align-items:center;gap:3px;padding:5px 8px;flex-wrap:wrap;cursor:pointer}
.persons-cell:hover{background:rgba(154,125,82,0.06)}

/* TRAVEFY LINK */
.travefy-link{color:var(--gold);text-decoration:none;font-size:11px}
.travefy-link:hover{text-decoration:underline}

/* CONFIRMATION CELL */
.confirm-cell{display:flex;align-items:center;justify-content:center;gap:5px;padding:4px 6px;flex-direction:column}
.confirm-photo-thumb{width:32px;height:32px;object-fit:cover;border-radius:3px;border:1px solid var(--border2);cursor:pointer}
.confirm-upload-btn{font-size:10px;color:var(--ink3);background:none;border:1px dashed var(--border2);padding:2px 5px;cursor:pointer;font-family:'Jost',sans-serif;letter-spacing:.04em}
.confirm-upload-btn:hover{color:var(--gold);border-color:var(--gold)}

/* TASK AUTO-CREATE MODAL */
.task-confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:400;display:flex;align-items:center;justify-content:center}
.task-confirm-box{background:var(--white);width:440px;max-width:95vw;padding:28px 28px 22px}
.task-confirm-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;margin-bottom:6px}
.task-confirm-sub{font-size:12px;color:var(--ink3);margin-bottom:18px;line-height:1.5}
.task-name-edit{border:1px solid var(--border2);padding:8px 10px;font-family:'Jost',sans-serif;font-size:12px;color:var(--ink);background:var(--sand);outline:none;width:100%;margin-bottom:14px}
.task-name-edit:focus{border-color:var(--gold)}
.task-confirm-row{display:flex;justify-content:flex-end;gap:10px}

/* PHOTO LIGHTBOX */
.photo-lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:flex;align-items:center;justify-content:center;cursor:pointer}
.photo-lightbox img{max-width:90vw;max-height:90vh;object-fit:contain}
.photo-lightbox-close{position:absolute;top:18px;right:22px;color:#fff;font-size:26px;cursor:pointer;line-height:1}

/* ADD ROW */
.add-row td{padding:6px 10px;font-size:11px;color:var(--ink3);cursor:pointer;border-top:1px dashed var(--border2)}
.add-row:hover td{color:var(--gold)}

/* STATUS DROPDOWN POPUP */
.status-popup{position:fixed;background:var(--white);border:1px solid var(--border2);box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:300;min-width:160px;padding:4px 0}
.sp-item{padding:8px 14px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px}
.sp-item:hover{background:var(--sand)}
.sp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* PERSON POPUP */
.person-popup{position:fixed;background:var(--white);border:1px solid var(--border2);box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:300;min-width:160px;padding:4px 0}
.pp-item{padding:7px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px}
.pp-item:hover{background:var(--sand)}
.pp-check{width:14px;height:14px;border:1px solid var(--border2);border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--gold)}

/* MODAL: NEW HANDOFF */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--white);width:560px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-head{padding:20px 24px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;letter-spacing:.04em}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink3);padding:0 4px}
.modal-body{padding:20px 24px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-row.single{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3)}
.form-input{border:1px solid var(--border2);padding:8px 10px;font-family:'Jost',sans-serif;font-size:12px;color:var(--ink);background:transparent;outline:none}
.form-input:focus{border-color:var(--gold)}
.form-select{border:1px solid var(--border2);padding:8px 10px;font-family:'Jost',sans-serif;font-size:12px;color:var(--ink);background:var(--white);outline:none;cursor:pointer}
.modal-foot{padding:14px 24px 20px;display:flex;justify-content:flex-end;gap:10px;border-top:1px solid var(--border)}

/* SUMMARY ROW */
.summary-row td{background:var(--sand);font-size:10px;color:var(--ink3);padding:5px 10px;letter-spacing:.04em}

/* EMPTY STATE */
.empty-week{padding:20px;text-align:center;font-size:12px;color:var(--ink3);font-style:italic;background:var(--white);border:1px solid var(--border);border-top:none}

/* WEEK COLORS */
.wc-0{background:#c4473a}.wc-1{background:#9a7d52}.wc-2{background:#3d5a8a}.wc-3{background:#5a3d8a}.wc-4{background:#3d8a5a}.wc-5{background:#8a5a3d}.wc-6{background:#5a8a3d}

/* VIEW TOGGLE */
.view-toggle{display:flex;border:1px solid var(--border2);overflow:hidden}
.view-toggle button{padding:4px 11px;font-size:11px;font-family:'Jost',sans-serif;border:none;background:transparent;cursor:pointer;color:var(--ink3);letter-spacing:.04em;transition:all .12s}
.view-toggle button.active{background:var(--ink);color:var(--white)}

/* CALENDAR VIEW */
.cal-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.cal-nav-btn{background:none;border:1px solid var(--border2);padding:4px 10px;cursor:pointer;font-size:13px;color:var(--ink2);font-family:'Jost',sans-serif;transition:all .12s}
.cal-nav-btn:hover{border-color:var(--gold);color:var(--gold)}
.cal-nav-label{font-size:13px;font-weight:500;letter-spacing:.04em;color:var(--ink2);min-width:180px;text-align:center}
.cal-nav-today{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);cursor:pointer;padding:4px 9px;border:1px solid var(--gold3);background:transparent;font-family:'Jost',sans-serif}
.cal-nav-today:hover{background:var(--gold3)}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border)}
.cal-day-head{background:var(--sand);padding:7px 8px;text-align:center}
.cal-day-name{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);font-weight:500}
.cal-day-num{font-size:18px;font-weight:300;color:var(--ink2);line-height:1.2}
.cal-day-num.today{color:var(--white);background:var(--gold);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:14px}
.cal-day-body{background:var(--white);min-height:140px;padding:5px;display:flex;flex-direction:column;gap:4px}
.cal-card{border-radius:3px;padding:5px 7px;cursor:pointer;border-left:3px solid transparent;background:var(--sand);transition:opacity .12s}
.cal-card:hover{opacity:.85}
.cal-card-time{font-size:10px;color:var(--ink3);letter-spacing:.04em;margin-bottom:2px}
.cal-card-activity{font-size:11px;font-weight:500;color:var(--ink);line-height:1.3}
.cal-card-client{font-size:10px;color:var(--ink3);margin-top:1px}
.cal-card-foot{display:flex;align-items:center;gap:3px;margin-top:4px}
.cal-empty{font-size:11px;color:var(--ink3);font-style:italic;text-align:center;padding:20px 0;opacity:.6}
.cal-add{font-size:10px;color:var(--ink3);cursor:pointer;padding:3px 5px;text-align:center;border:1px dashed var(--border2);margin-top:2px;letter-spacing:.04em}
.cal-add:hover{color:var(--gold);border-color:var(--gold)}
</style>
</head>
<body>

<div class="header">
  <a href="/" class="logo">Two Travel</a>
  <div class="hdiv"></div>
  <span class="hls">Operaciones · Handoffs</span>
  <div class="hright">
    <a href="/" class="back-btn">← Concierge</a>
  </div>
</div>

<div class="toolbar">
  <button class="tbtn primary" onclick="openNewModal()">+ Nuevo handoff</button>
  <div class="search-box">
    <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="5"/><line x1="10" y1="10" x2="14" y2="14"/></svg>
    <input type="text" placeholder="Buscar..." oninput="searchQ=this.value;render()" id="search-input">
  </div>
  <select class="form-select" style="font-size:11px;padding:4px 8px;border-color:var(--border2)" onchange="filterPerson=this.value;render()">
    <option value="">Todas las personas</option>
    <option value="Alia">Alia</option>
    <option value="Caro">Caro</option>
    <option value="Dani">Dani</option>
    <option value="Michel">Michel</option>
    <option value="Xilene">Xilene</option>
  </select>
  <div class="view-toggle">
    <button id="btn-table" class="active" onclick="setView('table')">☰ Tabla</button>
    <button id="btn-cal" onclick="setView('cal')">📅 Calendario</button>
  </div>
  <span class="sync-info" id="sync-info">Cargando...</span>
</div>

<div class="main" id="main"></div>

<!-- Status popup -->
<div id="status-popup" class="status-popup" style="display:none"></div>
<!-- Person popup -->
<div id="person-popup" class="person-popup" style="display:none"></div>

<!-- New Handoff Modal -->
<div class="overlay" id="new-modal" style="display:none" onclick="if(event.target===this)closeNewModal()">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">Nuevo Handoff</span>
      <button class="modal-close" onclick="closeNewModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Cliente</label>
          <input class="form-input" id="n-client" placeholder="Ej. Jerome V.">
        </div>
        <div class="form-group">
          <label class="form-label">Fecha de la actividad</label>
          <input class="form-input" type="datetime-local" id="n-date">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Actividad</label>
          <input class="form-input" id="n-activity" placeholder="Ej. Masajes, Almuerzo, IVs...">
        </div>
        <div class="form-group">
          <label class="form-label">Clientes (quiénes)</label>
          <input class="form-input" id="n-pax" placeholder="Ej. Todos, 8 pax, Tony y Rock">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Operador / Proveedor</label>
          <input class="form-input" id="n-operator" placeholder="Ej. Dennis, Carmen, Sions">
        </div>
        <div class="form-group">
          <label class="form-label">Donde se realizó la reservación</label>
          <select class="form-select" id="n-booking-where">
            <option value="">Seleccionar...</option>
            <option value="Grupo de Whatsapp">Grupo de Whatsapp</option>
            <option value="Email">Email</option>
            <option value="Llamada">Llamada</option>
            <option value="Presencial">Presencial</option>
            <option value="Plataforma">Plataforma</option>
            <option value="Otro">Otro</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Persona encargada de la actividad</label>
          <select class="form-select" id="n-person">
            <option value="">—</option>
            <option value="Alia">Alia</option>
            <option value="Caro">Caro</option>
            <option value="Dani">Dani</option>
            <option value="Michel">Michel</option>
            <option value="Xilene">Xilene</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Persona en vivo</label>
          <select class="form-select" id="n-person-live">
            <option value="">—</option>
            <option value="Alia">Alia</option>
            <option value="Caro">Caro</option>
            <option value="Dani">Dani</option>
            <option value="Michel">Michel</option>
            <option value="Xilene">Xilene</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Enlace Travefy</label>
          <input class="form-input" id="n-travefy" placeholder="https://travefy.com/...">
        </div>
        <div class="form-group">
          <label class="form-label">Estado</label>
          <select class="form-select" id="n-status">
            <option value="todo">Por hacer</option>
            <option value="inprog">En curso</option>
            <option value="cobrar">Por cobrar</option>
            <option value="cancel">Cancelado sin cargo</option>
            <option value="done">Listo</option>
          </select>
        </div>
      </div>
      <div class="form-row single">
        <div class="form-group">
          <label class="form-label">Notas</label>
          <textarea class="form-input" id="n-notes" rows="3" placeholder="Notas internas..."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="tbtn" onclick="closeNewModal()">Cancelar</button>
      <button class="tbtn primary" onclick="createHandoff()">Crear handoff</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwVj2nl99gFJB0ZeFIm_WrS2TepT2mu3m-tAoEy0Wc5-oO9Rj33i16nAp0jFBqLSI665A/exec';

const STATUSES = {
  todo:   {label:'Por hacer',          color:'#aaaaaa'},
  inprog: {label:'En curso',           color:'#5c8ae0'},
  cobrar: {label:'Por cobrar',         color:'#e05c5c'},
  cancel: {label:'Cancelado sin cargo',color:'#e0905c'},
  done:   {label:'Listo',              color:'#5cb87a'},
};

const MEMBERS = {
  Alia:   {bg:'#9a7d52',i:'AL'},
  Caro:   {bg:'#3d8a5a',i:'CA'},
  Dani:   {bg:'#8a3d5a',i:'DA'},
  Michel: {bg:'#3d5a8a',i:'MI'},
  Xilene: {bg:'#5a3d8a',i:'XI'},
};

let handoffs = [];
let searchQ = '';
let filterPerson = '';
let activePopup = null;
let currentView = 'table';
let calWeekStart = getMondayOf(new Date());

/* ── VIEW SWITCH ── */
function setView(v){
  currentView = v;
  document.getElementById('btn-table').classList.toggle('active', v==='table');
  document.getElementById('btn-cal').classList.toggle('active', v==='cal');
  render();
}

/* ── WEEK UTILS ── */
function getMondayOf(d){
  const day = d.getDay();
  const mon = new Date(d);
  mon.setDate(d.getDate() - (day===0?6:day-1));
  mon.setHours(0,0,0,0);
  return mon;
}
function getWeekKey(dateStr){
  if(!dateStr) return 'sin-fecha';
  const d = new Date(dateStr);
  if(isNaN(d)) return 'sin-fecha';
  const day = d.getDay();
  const monday = new Date(d);
  monday.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return monday.toISOString().split('T')[0];
}
function getWeekLabel(weekKey){
  if(weekKey === 'sin-fecha') return 'Sin fecha';
  const mon = new Date(weekKey + 'T00:00:00');
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const fmt = d => `${d.toLocaleString('es',{month:'short'})} ${d.getDate()}`;
  return `Semana ${fmt(mon)} – ${fmt(sun)}`;
}
function weekOrder(weekKey){
  if(weekKey === 'sin-fecha') return '9999';
  return weekKey;
}

/* ── STORAGE ── */
function save(){
  localStorage.setItem('tt_handoffs', JSON.stringify(handoffs));
  syncToGAS();
}
function load(){
  const saved = localStorage.getItem('tt_handoffs');
  if(saved){ try{ handoffs=JSON.parse(saved); }catch{} }
  if(!handoffs.length) handoffs = sampleData();
}
async function syncToGAS(){
  try{
    await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'saveHandoffs',data:{handoffs}})});
  }catch{}
}
async function loadFromGAS(){
  setSyncInfo('Sincronizando...');
  try{
    const r = await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},

function renderCalendar(){
  const main = document.getElementById('main');
  const days = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const today = new Date(); today.setHours(0,0,0,0);

  // Week days: Mon–Sun
  const weekDays = Array.from({length:7}, (_,i) => {
    const d = new Date(calWeekStart);
    d.setDate(calWeekStart.getDate() + i);
    return d;
  });

  // Nav label
  const fmt = d => `${d.getDate()} ${d.toLocaleString('es',{month:'short'})}`;
  const navLabel = `${fmt(weekDays[0])} – ${fmt(weekDays[6])} ${weekDays[0].getFullYear()}`;

  // Filter handoffs
  let items = handoffs.filter(h => {
    const q = searchQ.toLowerCase();
    const matchQ = !q || [h.client,h.activity,h.pax,h.operator,h.notes].some(f=>(f||'').toLowerCase().includes(q));
    const matchP = !filterPerson || h.person===filterPerson || h.personLive===filterPerson;
    return matchQ && matchP;
  });

  // Map handoffs to days
  const byDay = {};
  weekDays.forEach(d => { byDay[d.toDateString()] = []; });
  items.forEach(h => {
    if(!h.date) return;
    const hd = new Date(h.date); hd.setHours(0,0,0,0);
    const key = hd.toDateString();
    if(byDay[key]) byDay[key].push(h);
  });
  // Sort each day by time
  weekDays.forEach(d => {
    byDay[d.toDateString()].sort((a,b) => (a.date||'') < (b.date||'') ? -1 : 1);
  });

  const personAvatar = (name) => {
    if(!name) return '';
    const m = MEMBERS[name];
    return `<span class="person-chip" style="background:${m?m.bg:'#aaa'};width:18px;height:18px;font-size:7px" title="${name}">${m?m.i:name[0]}</span>`;
  };

  // Build day columns
  const headCells = weekDays.map((d,i) => {
    const isToday = d.getTime() === today.getTime();
    return `<div class="cal-day-head">
      <div class="cal-day-name">${days[i]}</div>
      <div class="cal-day-num ${isToday?'today':''}">${d.getDate()}</div>
    </div>`;
  }).join('');

  const bodyCells = weekDays.map(d => {
    const key = d.toDateString();
    const dayHandoffs = byDay[key] || [];
    const wkStr = d.toISOString().split('T')[0];
    const cards = dayHandoffs.map(h => {
      const st = STATUSES[h.status] || STATUSES.todo;
      const time = h.date ? new Date(h.date).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}) : '';
      return `<div class="cal-card" style="border-left-color:${st.color};background:${st.color}18"
        onclick="openHandoffDetail('${h.id}')">
        <div class="cal-card-time">${time} ${h.confirmation?'✅':''}</div>
        <div class="cal-card-activity">${esc(h.activity||'')}</div>
        <div class="cal-card-client">${esc(h.client||'')}${h.pax?' · '+esc(h.pax):''}</div>
        <div class="cal-card-foot">${personAvatar(h.person)}${h.personLive&&h.personLive!==h.person?personAvatar(h.personLive):''}</div>
      </div>`;
    }).join('');

    return `<div class="cal-day-body">
      ${cards || '<div class="cal-empty">—</div>'}
      <div class="cal-add" onclick="openNewModal('${wkStr}')">+ agregar</div>
    </div>`;
  }).join('');

  main.innerHTML = `
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calPrev()">‹</button>
      <span class="cal-nav-label">${navLabel}</span>
      <button class="cal-nav-btn" onclick="calNext()">›</button>
      <button class="cal-nav-today" onclick="calToday()">Hoy</button>
    </div>
    <div class="cal-grid">
      ${headCells}
      ${bodyCells}
    </div>`;
}

function renderTable(){
  const main = document.getElementById('main');
  let items = handoffs.filter(h => {
    const q = searchQ.toLowerCase();
    const matchQ = !q || [h.client,h.activity,h.pax,h.operator,h.notes].some(f=>(f||'').toLowerCase().includes(q));
    const matchP = !filterPerson || h.person===filterPerson || h.personLive===filterPerson;
    return matchQ && matchP;
  });

  // Group by week
  const groups = {};
  items.forEach(h => {
    const wk = getWeekKey(h.date);
    if(!groups[wk]) groups[wk] = [];
    groups[wk].push(h);
  });
  const weekKeys = Object.keys(groups).sort((a,b) => weekOrder(a) < weekOrder(b) ? -1 : 1);

  let html = '';
  let colorIdx = 0;
  weekKeys.forEach(wk => {
    const rows = groups[wk];
    const collapsed = collapsedWeeks.has(wk);
    const label = getWeekLabel(wk);
    const ci = colorIdx++ % 7;
    html += `
    <div class="week-group" data-wk="${wk}">
      <div class="week-header" onclick="toggleWeek('${wk}')">
        <div class="week-color wc-${ci}"></div>

      </div>`;
    if(!collapsed){
      html += `<div class="table-wrap"><table class="htable">
        <thead><tr>
          <th></th>
          <th>Cliente</th>
          <th>Fecha · Hora</th>
          <th>Actividad</th>
          <th>Clientes</th>
          <th>Enlace Travefy</th>
          <th>Operador</th>
          <th>Reservación via</th>
          <th>Confirmación</th>
          <th>Encargada</th>
          <th>En vivo</th>
          <th>Notas</th>
          <th>Estado</th>
        </tr></thead>
        <tbody>`;
      rows.forEach(h => { html += renderRow(h); });
      html += `<tr class="add-row" onclick="openNewModal('${wk}')">
        <td colspan="13">+ Agregar handoff</td>

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ── INLINE EDIT ── */
function editCell(cell, id, field){
  const h = handoffs.find(x=>x.id===id);
  if(!h) return;
  const cur = h[field] || '';

  let input;
  if(field === 'date'){
    input = document.createElement('input');
    input.type = 'datetime-local';
    input.value = cur ? cur.slice(0,16) : '';
  } else if(field === 'bookingWhere'){
    input = document.createElement('select');
    ['','Grupo de Whatsapp','Email','Llamada','Presencial','Plataforma','Otro'].forEach(v=>{
      const o = document.createElement('option'); o.value=v; o.textContent=v||'—'; if(v===cur) o.selected=true;
      input.appendChild(o);
    });
  } else {
    input = document.createElement('input');
    input.value = cur;
    input.placeholder = field;
  }

  input.style.cssText = 'width:100%;border:none;outline:none;font-family:Jost,sans-serif;font-size:12px;color:var(--ink);background:rgba(154,125,82,0.08);padding:6px 10px;height:38px';

  const done = () => {
    h[field] = input.value;
    save();
    render();
  };
  input.addEventListener('blur', done);
  input.addEventListener('keydown', e => { if(e.key==='Enter'){ e.preventDefault(); done(); } if(e.key==='Escape'){ render(); } });

  cell.innerHTML = '';
  cell.appendChild(input);
  input.focus();
  if(input.type === 'text' || input.tagName === 'INPUT') input.select();
}

function openConfirmToggle(id, e){
  e.stopPropagation();
  const h = handoffs.find(x=>x.id===id);
  if(!h) return;
  const wasConfirmed = h.confirmation;
  h.confirmation = !h.confirmation;
  save();
  render();
  // When toggling ON: offer to create a reservation task
  if(!wasConfirmed && h.confirmation){
    showTaskCreateModal(h);
  }
}

/* ── PHOTO UPLOAD ── */
function triggerPhotoUpload(id, e){
  e.stopPropagation();
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = () => {
    const file = input.files[0];
    if(!file) return;
    // Resize to thumbnail before storing (max 400px wide)
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxW = 800;
        const scale = img.width > maxW ? maxW / img.width : 1;
        canvas.width  = img.width  * scale;
        canvas.height = img.height * scale;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.75);
        const h = handoffs.find(x=>x.id===id);
        if(h){ h.confirmPhoto = dataUrl; save(); render(); }
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function openPhotoLightbox(id){
  const h = handoffs.find(x=>x.id===id);
  if(!h || !h.confirmPhoto) return;
  const box = document.createElement('div');

  box.innerHTML = `<span class="photo-lightbox-close" onclick="this.parentNode.remove()">×</span>
    <img src="${h.confirmPhoto}">`;
  box.addEventListener('click', e => { if(e.target === box) box.remove(); });
  document.body.appendChild(box);
}

async function createTaskFromHandoff(handoffId){
  const nameEl = document.getElementById('tc-task-name');
  const taskName = nameEl ? nameEl.value.trim() : '';
  closeTaskModal();
  if(!taskName) return;
  const h = handoffs.find(x=>x.id===handoffId);
  const task = {
    taskName,
    assignedTo:   h?.person || '',
    dueDate:      h?.date   ? h.date.slice(0,10) : '',
    status:       'pending',
    notes:        `Handoff: ${h?.client||''} · ${h?.activity||''}`,
    handoffId:    handoffId,
    createdAt:    new Date().toISOString(),
  };
  try{
    const r = await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'saveTask',payload:task})});
    const d = await r.json();
    if(d.ok){
      showToast('Tarea creada ✓');
    } else {
      showToast('Error al crear tarea: ' + (d.error||''));
    }
  } catch(err){
    showToast('Sin conexión — tarea no guardada');
  }
}

/* ── TOAST ── */
function showToast(msg, duration=3000){
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:9px 18px;font-size:12px;letter-spacing:.04em;z-index:600;border-radius:2px;pointer-events:none;opacity:1;transition:opacity .3s';
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(), 300); }, duration);
}

function positionPopup(popup, e){
  popup.style.display = 'block';
  const rect = e.target.getBoundingClientRect ? e.target.getBoundingClientRect() : {bottom:e.clientY,left:e.clientX};
  let top = (rect.bottom || e.clientY) + 4;
  let left = rect.left || e.clientX;
  if(left + 180 > window.innerWidth) left = window.innerWidth - 185;
  if(top + 200 > window.innerHeight) top = (rect.top || e.clientY) - 205;
  popup.style.top = top + 'px';
  popup.style.left = left + 'px';
}
function closePopups(){
  document.getElementById('status-popup').style.display = 'none';
  document.getElementById('person-popup').style.display = 'none';
  activePopup = null;
}
