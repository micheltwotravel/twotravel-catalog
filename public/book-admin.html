<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calendarios · Two Travel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', sans-serif; background: #f7f5f2; color: #1a1814; min-height: 100vh; }
  .page { max-width: 600px; margin: 0 auto; padding: 32px 16px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .sub { color: #9a7d52; font-size: 14px; margin-bottom: 28px; }
  .card { background: #fff; border-radius: 14px; border: 1px solid #e8e2d9; padding: 20px; margin-bottom: 14px; display: flex; align-items: center; gap: 16px; }
  .avatar { width: 44px; height: 44px; border-radius: 50%; background: #e8e2d9; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: #9a7d52; flex-shrink: 0; }
  .info { flex: 1; }
  .name { font-weight: 600; font-size: 15px; }
  .role { font-size: 12px; color: #9a7d52; }
  .status { font-size: 12px; margin-top: 4px; }
  .status.connected { color: #16a34a; }
  .status.disconnected { color: #9a9a9a; }
  .btn { padding: 8px 16px; border-radius: 8px; border: none; font-size: 13px; cursor: pointer; font-weight: 500; text-decoration: none; display: inline-block; }
  .btn-connect { background: #1a1814; color: #fff; }
  .btn-copy { background: #f5f0e8; color: #9a7d52; border: 1px solid #e8e2d9; }
  .btn-copy:hover { background: #ede8e0; }
  .link-box { background: #f5f0e8; border: 1px solid #e8e2d9; border-radius: 8px; padding: 8px 12px; font-size: 12px; font-family: monospace; word-break: break-all; margin-top: 8px; color: #6b5a3e; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #1a1814; color: #fff; padding: 10px 18px; border-radius: 10px; font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .back { font-size: 12px; color: #9a7d52; text-decoration: none; display: inline-block; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="page">
  <a href="/?mode=concierge" class="back">← Panel</a>
  <h1>Calendarios de reuniones</h1>
  <p class="sub">Conecta el Google Calendar de cada concierge para activar su link de booking.</p>

  <div id="cards"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const BASE = location.origin;

const CONCIERGES = [
  { slug: "caro",    name: "Carolina Lopez",        role: "Senior Concierge Cartagena", initials: "CL" },
  { slug: "alia",    name: "Alia Jadad",            role: "Senior Concierge Cartagena", initials: "AJ" },
  { slug: "daniela", name: "Daniela Becerra",       role: "Senior Concierge Medellín",  initials: "DB" },
  { slug: "nataly",  name: "Nataly Cruz",           role: "Senior Concierge CDMX",      initials: "NC" },
  { slug: "giulia",  name: "Giulia Lorini Serrato", role: "Senior Concierge CDMX",      initials: "GL" },
  { slug: "natalia", name: "Natalia Peniche",       role: "Senior Concierge CDMX",      initials: "NP" },
];

// Check URL params for connection feedback
const urlParams = new URLSearchParams(location.search);
const connected = urlParams.get("connected");
const error     = urlParams.get("error");
if (connected) showToast(`✅ Calendario de ${connected} conectado`);
if (error)     showToast(`❌ Error: ${error}`, 5000);

// Check which concierges have tokens (via GAS)
const GAS_URL = "https://script.google.com/macros/s/AKfycbwVj2nl99gFJB0ZeFIm_WrS2TepT2mu3m-tAoEy0Wc5-oO9Rj33i16nAp0jFBqLSI665A/exec";

async function loadStatus() {
  let connected = {};
  try {
    const res  = await fetch(GAS_URL, { method:"POST", body: JSON.stringify({ action:"getCalendarTokens", payload:{} }) });
    const data = await res.json();
    (data.tokens || []).forEach(t => { connected[t.concierge] = true; });
  } catch {}

  const container = document.getElementById("cards");
  container.innerHTML = "";

  CONCIERGES.forEach(c => {
    const isConnected = !!connected[c.slug];
    const bookUrl = `${BASE}/book.html?c=${c.slug}`;

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="avatar">${c.initials}</div>
      <div class="info">
        <div class="name">${c.name}</div>
        <div class="role">${c.role}</div>
        <div class="status ${isConnected ? "connected" : "disconnected"}">
          ${isConnected ? "✅ Calendario conectado" : "⚪ Sin conectar"}
        </div>
        ${isConnected ? `<div class="link-box">${bookUrl}</div>` : ""}
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end">
        <a href="/api/auth/google-connect?concierge=${c.slug}" class="btn btn-connect">
          ${isConnected ? "Reconectar" : "Conectar"}
        </a>
        ${isConnected ? `<button class="btn btn-copy" onclick="copyLink('${bookUrl}')">Copiar link</button>` : ""}
      </div>
    `;
    container.appendChild(card);
  });
}

function copyLink(url) {
  navigator.clipboard.writeText(url).then(() => showToast("Link copiado ✓")).catch(() => prompt("Copia:", url));
}

function showToast(msg, dur = 2500) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), dur);
}

loadStatus();
</script>
</body>
</html>
