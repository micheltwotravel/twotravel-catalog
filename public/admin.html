<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two Travel · Portfolio Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --sand:#f7f4ef;--sand2:#efe9e0;--sand3:#e5ddd3;
  --ink:#1a1814;--ink2:#3d3a35;--ink3:#7a7570;
  --gold:#9a7d52;--gold2:#c4a272;--gold3:#e8d5b7;
  --white:#ffffff;--border:rgba(26,24,20,.09);--border2:rgba(26,24,20,.15);
  --green:#3a9960;--red:#e05050;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jost',sans-serif;background:var(--sand);color:var(--ink);font-weight:300;min-height:100vh}

.header{background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;height:52px;position:sticky;top:0;z-index:20}
.logo{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:500;letter-spacing:.04em}
.hdiv{width:1px;height:13px;background:var(--border2);margin:0 12px}
.hls{font-size:10px;color:var(--ink3);letter-spacing:.12em;text-transform:uppercase}
.hright{margin-left:auto;display:flex;align-items:center;gap:8px}
.hbadge{font-size:10px;color:var(--gold);border:1px solid var(--gold3);padding:3px 10px;background:rgba(154,125,82,.04)}
.hlink{font-size:10px;color:var(--ink3);text-decoration:none;letter-spacing:.06em;padding:4px 10px;border:1px solid var(--border);transition:all .1s}
.hlink:hover{border-color:var(--gold);color:var(--gold)}

.layout{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 52px)}
.sidebar{background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.main{overflow-y:auto;background:var(--sand)}

.sb-top{padding:14px 14px 10px;border-bottom:1px solid var(--border)}
.sb-sec{font-size:8.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}
.sb-search{width:100%;padding:7px 10px;background:var(--sand);border:1px solid var(--border);font-family:'Jost',sans-serif;font-size:12px;color:var(--ink);outline:none;margin-bottom:7px}
.sb-search:focus{border-color:var(--gold)}
.sb-search::placeholder{color:var(--ink3)}
.pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.pill{padding:3px 8px;border:1px solid var(--border);font-size:9px;color:var(--ink3);cursor:pointer;background:transparent;font-family:'Jost',sans-serif;letter-spacing:.04em;transition:all .1s}
.pill.on{border-color:var(--gold);color:var(--gold);background:rgba(154,125,82,.06)}
.pill:hover:not(.on){color:var(--ink2);border-color:var(--border2)}
.add-btn{width:100%;margin-top:7px;padding:7px;background:transparent;border:1px dashed var(--border2);font-family:'Jost',sans-serif;font-size:11px;color:var(--ink3);cursor:pointer;transition:all .1s;letter-spacing:.04em;display:flex;align-items:center;justify-content:center;gap:6px}
.add-btn:hover{border-color:var(--gold);color:var(--gold)}

.plist{flex:1;overflow-y:auto}
.plist::-webkit-scrollbar{width:3px}
.plist::-webkit-scrollbar-thumb{background:var(--sand3)}
.pi{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.pi:hover{background:var(--sand)}
.pi.active{background:var(--sand);border-left:2px solid var(--gold);padding-left:12px}
.pi-row1{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:3px}
.pi-name{font-size:12.5px;color:var(--ink);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-sub{font-size:10px;color:var(--ink3)}
.tag{font-size:8px;padding:1px 5px;letter-spacing:.04em;text-transform:uppercase;border:1px solid}
.tc{color:var(--gold);border-color:var(--gold3);background:rgba(154,125,82,.07)}
.tt{color:var(--ink3);border-color:var(--border2);background:var(--sand2)}
.ts-active{color:var(--green);border-color:rgba(58,153,96,.3);background:rgba(58,153,96,.07)}
.ts-inactive{color:var(--red);border-color:rgba(224,80,80,.2);background:rgba(224,80,80,.06)}

.empty{height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--ink3);opacity:.45}
.empty p{font-size:10px;letter-spacing:.1em;text-transform:uppercase}

/* Detail */
.det{padding:28px 32px 48px}
.det-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.det-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;line-height:1.1}
.det-sub{font-size:11px;color:var(--ink3);margin-top:4px;letter-spacing:.04em}
.det-acts{display:flex;gap:7px;flex-shrink:0;margin-top:6px}
.da{padding:6px 13px;border:1px solid var(--border2);background:transparent;font-family:'Jost',sans-serif;font-size:10px;color:var(--ink3);cursor:pointer;transition:all .1s;letter-spacing:.05em;text-decoration:none;display:inline-block}
.da:hover{border-color:var(--gold);color:var(--gold)}
.da.pri{background:var(--ink);color:var(--white);border-color:var(--ink)}
.da.pri:hover{background:var(--gold);border-color:var(--gold)}
.da.del{color:var(--red);border-color:rgba(224,80,80,.25)}
.da.del:hover{background:rgba(224,80,80,.06);border-color:var(--red)}
.dg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.dsec{font-size:8.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);grid-column:1/-1;padding:14px 0 6px;border-top:1px solid var(--border);margin-top:4px}
.dsec:first-child{border-top:none;padding-top:0;margin-top:0}
.df{display:flex;flex-direction:column;gap:4px}
.df.full{grid-column:1/-1}
.df.half{grid-column:span 2}
.dl{font-size:8px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink3)}
.dv{font-size:13px;color:var(--ink2);line-height:1.5}
.dv.muted{color:var(--ink3);font-style:italic;font-size:12px}
.dlink{font-size:12px;color:#1d4ed8;text-decoration:underline;word-break:break-all}
.atags{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}
.atag{padding:3px 8px;font-size:10px;border:1px solid var(--border2);color:var(--ink2);background:var(--white)}

/* Form */
.fwrap{padding:28px 32px 48px}
.fhead{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.fhead-name{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400}
.fg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.fg .full{grid-column:1/-1}
.fg .half{grid-column:span 2}
.fsec{font-size:8.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);grid-column:1/-1;padding:14px 0 4px;border-top:1px solid var(--border);margin-top:2px}
.fsec:first-child{border-top:none;padding-top:0;margin-top:0}
.fl{display:flex;flex-direction:column;gap:5px}
label{font-size:8px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink3)}
input,select,textarea{padding:8px 10px;background:var(--white);border:1px solid var(--border2);font-family:'Jost',sans-serif;font-size:13px;color:var(--ink);outline:none;transition:border .1s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
input::placeholder,textarea::placeholder{color:var(--ink3)}
textarea{resize:vertical;min-height:80px;line-height:1.5}

/* Amenity picker */
.amen-section{margin-bottom:14px}
.amen-group-label{font-size:8px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
.amen-chips{display:flex;flex-wrap:wrap;gap:5px}
.ac{padding:5px 11px;border:1px solid var(--border2);font-size:11px;color:var(--ink3);cursor:pointer;transition:all .1s;user-select:none;background:var(--white)}
.ac:hover{border-color:var(--gold2);color:var(--ink2)}
.ac.sel{border-color:var(--gold);color:var(--gold);background:rgba(154,125,82,.07);font-weight:400}

.fbtns{display:flex;gap:10px;align-items:center;margin-top:24px;padding-top:18px;border-top:1px solid var(--border);grid-column:1/-1}
.fb{padding:9px 22px;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.06em;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--ink2);transition:all .12s}
.fb:hover{border-color:var(--gold);color:var(--gold)}
.fb.pri{background:var(--ink);color:var(--white);border-color:var(--ink)}
.fb.pri:hover{background:var(--gold);border-color:var(--gold)}
.fb:disabled{opacity:.4;cursor:not-allowed}
.fmsg{font-size:11px;color:var(--ink3);margin-left:6px}

.toast{position:fixed;bottom:22px;right:22px;padding:10px 16px;font-size:12px;letter-spacing:.04em;border:1px solid;z-index:300;transition:opacity .2s,transform .2s;pointer-events:none}
.toast.ok{background:rgba(58,153,96,.08);border-color:rgba(58,153,96,.35);color:var(--green)}
.toast.err{background:rgba(224,80,80,.08);border-color:rgba(224,80,80,.3);color:var(--red)}
.toast.gone{opacity:0;transform:translateY(6px)}
.spin{display:inline-block;width:11px;height:11px;border:1.5px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header class="header">
  <span class="logo">Two Travel</span>
  <div class="hdiv"></div>
  <span class="hls">Portfolio Manager</span>
  <div class="hright">
    <span class="hbadge" id="count-badge">— properties</span>
    <a href="/agent.html" class="hlink">← Sales Agent</a>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sb-top">
      <div class="sb-sec">Portfolio</div>
      <input class="sb-search" id="sb-q" placeholder="Search name, neighborhood…" oninput="renderList()">
      <div class="pills" id="city-pills"></div>
      <div class="pills" id="type-pills"></div>
      <button class="add-btn" onclick="openNew()">
        <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add property / experience
      </button>
    </div>
    <div class="plist" id="plist">
      <div style="padding:28px;text-align:center;font-size:11px;color:var(--ink3)"><span class="spin"></span>Loading…</div>
    </div>
  </div>

  <div class="main" id="main">
    <div class="empty" id="empty-state">
      <svg width="30" height="30" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <p>Select a property</p>
    </div>
    <div id="main-content" style="display:none"></div>
  </div>
</div>

<div class="toast gone" id="toast"></div>

<script>
const GAS = "https://script.google.com/macros/s/AKfycbwVj2nl99gFJB0ZeFIm_WrS2TepT2mu3m-tAoEy0Wc5-oO9Rj33i16nAp0jFBqLSI665A/exec";

const AMENITY_GROUPS = {
  "Outdoor & Water":    ["Pool","Infinity Pool","Heated Pool","Jacuzzi","Plunge Pool","Ocean View","Sea View","Beach Access","Waterfront","Private Dock","Rooftop","Terrace","Balcony","Garden","BBQ","Fire Pit","Outdoor Kitchen","Outdoor Shower"],
  "Views & Location":   ["City View","Mountain View","Valley View","Garden View","Jungle View","Bay View"],
  "Entertainment":      ["Sound System","Karaoke","Home Theater","Game Room","Bar","Dance Floor","DJ Booth","Billiards","Ping Pong","Foosball"],
  "Wellness":           ["Gym","Yoga Space","Sauna","Steam Room","Massage Area","Cold Plunge"],
  "Services Included":  ["Chef Included","Chef Kitchen","Captain Included","Crew Included","Cleaning Included","Concierge Included","Driver Included","Security","Butler Service"],
  "Essentials":         ["WiFi","Smart TV","AC","Parking","Elevator","Washer/Dryer","Laundry","Pet Friendly","Wheelchair Access"],
  "Special Features":   ["Bachelor Friendly","Wine Cellar","Private Pool","Tennis Court","Basketball Court","Pickleball","Putting Green","Helipad","Private Island"],
};

// ── Agent Tags — what the AI uses to match client requests ─────────────
const TAG_GROUPS = {
  "✨ Vibe": [
    "Luxury","Ultra-Luxury","Boutique","Party","Chill & Relaxed",
    "Romantic","Adults Only","Family Friendly","Corporate","Exclusive","Hidden Gem",
  ],
  "🎉 Occasion": [
    "Bachelorette","Bachelor","Wedding","Honeymoon","Anniversary",
    "Birthday","Corporate Retreat","Team Building","Proposal","Quince",
  ],
  "👥 Group Size": [
    "Intimate (2–8)","Small Group (8–20)","Medium Group (20–40)","Large Group (40–80)","Mega Group (80+)",
  ],
  "📍 Setting": [
    "Beachfront","Oceanfront","Rooftop","Historic","Colonial","Modern",
    "Jungle / Nature","Urban","Private Island","Clifftop","Countryside",
  ],
  "🎯 Activities": [
    "Nightlife","Water Sports","Snorkeling","Diving","Fishing",
    "Gastronomy","Wine & Spirits","Wellness / Spa","Yoga & Meditation",
    "Cultural","Adventure","Sunset Cruise","Day Trip","Shopping",
  ],
  "💰 Price Range": [
    "Budget-Friendly","Mid-Range","Premium","Luxury Tier","Ultra-Premium",
  ],
};

const CITIES   = ["Cartagena","Medellín","Mexico City","Tulum","Cancún","Bogotá","Santa Marta","Barranquilla","Miami","Panamá"];
const TYPES    = ["Villa","Yacht","Boat","Catamaran","Speedboat","Island","Wedding Venue","Penthouse","Apartment","Finca","Hacienda","Hotel","Restaurant","Experience"];
const STATUSES = ["Active","Inactive","On Request","Coming Soon","Seasonal"];
const CANCELS  = ["No refunds","50% refund 30+ days out","Full refund 30+ days out","Full refund 15+ days out","Full refund 7+ days out","Flexible — full refund 48h","Non-refundable"];

let allProps = [];
let selId    = null;
let fCity    = "";
let fType    = "";
let selAmens = [];
let selTags  = [];

async function gas(body) {
  const r = await fetch(GAS, { method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(body) });
  const t = await r.text();
  try { return JSON.parse(t); } catch { return {error:t}; }
}

async function load() {
  try {
    const d = await gas({ action:"property_list" });
    allProps = (d.properties||[]).filter(p=>p.name);
    document.getElementById("count-badge").textContent = allProps.length+" properties";
    buildFilterPills();
    renderList();
  } catch(e) {
    toast("Could not load — check GAS","err");
    document.getElementById("plist").innerHTML='<div style="padding:20px;text-align:center;font-size:11px;color:var(--red)">Error loading</div>';
  }
}

function buildFilterPills() {
  // Cities — sorted by count
  const cityCounts = {};
  const typeCounts = {};
  allProps.forEach(p => {
    const c = (p.city||"").trim();
    const t = (p["item type"]||p.type||"").trim();
    if (c) cityCounts[c] = (cityCounts[c]||0) + 1;
    if (t) typeCounts[t] = (typeCounts[t]||0) + 1;
  });
  const cities = Object.entries(cityCounts).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
  const types  = Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);

  function makePills(containerId, fk, items) {
    const el = document.getElementById(containerId);
    el.innerHTML = '';
    const allBtn = document.createElement('button');
    allBtn.className = 'pill on';
    allBtn.dataset.fk = fk;
    allBtn.dataset.fv = '';
    allBtn.textContent = fk === 'city' ? 'All cities' : 'All types';
    allBtn.addEventListener('click', () => setPill(fk, ''));
    el.appendChild(allBtn);
    items.forEach(val => {
      const btn = document.createElement('button');
      btn.className = 'pill';
      btn.dataset.fk = fk;
      btn.dataset.fv = val;
      btn.textContent = val;
      btn.addEventListener('click', () => setPill(fk, val));
      el.appendChild(btn);
    });
  }

  makePills('city-pills', 'city', cities);
  makePills('type-pills', 'type', types);
}

function setPill(k, v) {
  if(k==="city") fCity=v; else fType=v;
  document.querySelectorAll(`.pill[data-fk="${k}"]`).forEach(x=>x.classList.toggle("on", x.dataset.fv===v));
  renderList();
}


function renderList(){
  const q=(document.getElementById("sb-q").value||"").toLowerCase();
  const rows=allProps.filter(p=>{
    const city=(p.city||"").toLowerCase();
    const type=(p["item type"]||p.type||"").toLowerCase();
    const name=(p.name||"").toLowerCase();
    const hood=(p.neighborhood||"").toLowerCase();
    const amen=(p.amenities||"").toLowerCase();
    return (!fCity||city.includes(fCity.toLowerCase()))
        && (!fType||type.includes(fType.toLowerCase()))
        && (!q||name.includes(q)||hood.includes(q)||city.includes(q)||amen.includes(q));
  }).sort((a,b)=>{
    const da = a.updatedAt||a.createdAt||"";
    const db = b.updatedAt||b.createdAt||"";
    if(da&&db) return db.localeCompare(da); // newest first
    if(da) return -1;
    if(db) return 1;
    return (a.name||"").localeCompare(b.name||"");
  });

  const list=document.getElementById("plist");
  if(!rows.length){ list.innerHTML='<div style="padding:24px;text-align:center;font-size:11px;color:var(--ink3)">No results</div>'; return; }
  list.innerHTML="";
  rows.forEach(p=>{
    const id=p.id||p.name;
    const type=p["item type"]||p.type||"";
    const status=p.status||"";
    const stTag=status==="Active"?`<span class="tag ts-active">Active</span>`:status==="Inactive"?`<span class="tag ts-inactive">Inactive</span>`:status?`<span class="tag tt">${esc(status)}</span>`:"";
    const pax=p["max pax"]||p.maxPax||"";
    const beds=p.bedrooms||"";
    const el=document.createElement("div");
    el.className="pi"+(id===selId?" active":"");
    el.onclick=()=>showDetail(id);
    el.innerHTML=`<div class="pi-row1"><span class="tag tc">${esc(p.city||"")}</span><span class="tag tt">${esc(type)}</span>${stTag}</div><div class="pi-name">${esc(p.name)}</div><div class="pi-sub">${[p.neighborhood,pax?`👥 ${pax} pax`:"",beds?`🛏 ${beds}`:""].filter(Boolean).join(" · ")}</div>`;
    list.appendChild(el);
  });
}

function showDetail(id){
  selId=id; renderList();
  const p=allProps.find(x=>(x.id||x.name)===id);
  if(!p) return;
  show("main-content"); hide("empty-state");

  const type  =p["item type"]||p.type||"";
  const maxpax=p["max pax"]||p.maxPax||"";
  const cprice=p["client price"]||p.clientPrice||"";
  const oprice=p["our price"]||p.ourPrice||"";
  const airbnb=p["airbnb link"]||p.airbnbLink||"";
  const photos=p["photos link"]||p.photosLink||"";
  const webpage=p["twp travel webpage"]||p.webpage||"";
  const desc  =p.description||"";
  const notes =p.notes||"";
  const contact=p["contact name"]||p.contactName||"";
  const phone =p["contact phone"]||p.contactPhone||"";
  const cxl   =p["cancellation policy"]||p.cancellationPolicy||"";
  const checkin=p["check-in time"]||p.checkIn||"";
  const checkout=p["check-out time"]||p.checkOut||"";
  const amenArr=(p.amenities||"").split(",").map(s=>s.trim()).filter(Boolean);

  document.getElementById("main-content").innerHTML=`
    <div class="det">
      <div class="det-head">
        <div>
          <div class="det-name">${esc(p.name)}</div>
          <div class="det-sub">${[p.city,p.neighborhood,type].filter(Boolean).join(" · ")}</div>
        </div>
        <div class="det-acts">
          ${airbnb?`<a href="${esc(airbnb)}" target="_blank" class="da">Airbnb ↗</a>`:""}
          ${photos?`<a href="${esc(photos)}" target="_blank" class="da">Photos ↗</a>`:""}
          ${webpage?`<a href="${esc(webpage)}" target="_blank" class="da">Web ↗</a>`:""}
          <button class="da pri" onclick="openEdit('${esc(id)}')">✏ Edit</button>
          <button class="da del" onclick="deleteProperty('${esc(id)}')">Delete</button>
        </div>
      </div>
      <div class="dg">
        <div class="dsec">Details</div>
        ${df("City",p.city)} ${df("Type",type)} ${df("Status",p.status)}
        ${df("Subtype / Boat Type",p["subtype / boat type"]||p.boatType)}
        ${df("Neighborhood",p.neighborhood)} ${df("Max Guests",maxpax?maxpax+" pax":"")}
        ${df("Bedrooms",p.bedrooms)} ${df("Bathrooms",p.bathrooms)} ${df("Beds",p.beds)}
        ${df("Capacity (events)",p.capacity)} ${df("Sq Ft / m²",p.feet)}
        ${df("Rating",p.rating)} ${df("Party Friendly",p["bachelor / party friendly"])}
        ${df("Venue Type",p["venue type"]||p.venueType)}
        ${df("AC Below Deck",p["ac below deck"])} ${df("Dock Location",p["dock location"]||p.dockLocation)}

        <div class="dsec">Pricing</div>
        ${df("Client Price",cprice)} ${df("Price Range",p["price range"]||p.priceRange)} ${df("Our Price",oprice)}
        ${df("Quote 2025",p["quote 2025"]||p.quote2025)} ${df("Commission Tier",p["commission tier"]||p.commissionTier)}
        ${df("Payment Methods",p["payment methods"]||p.paymentMethods)}

        <div class="dsec">Policies & Logistics</div>
        ${df("Check-in",checkin)} ${df("Check-out",checkout)}
        ${cxl?`<div class="df half"><div class="dl">Cancellation Policy</div><div class="dv">${esc(cxl)}</div></div>`:""}
        ${df("Min Hours",p["min hours"]||p.minHours)} ${df("Max Hours",p["max hours"]||p.maxHours)}

function df(label,val){
  if(!val&&val!==0) return `<div class="df"><div class="dl">${label}</div><div class="dv muted">—</div></div>`;
  return `<div class="df"><div class="dl">${label}</div><div class="dv">${esc(String(val))}</div></div>`;
}

function buildAmenityPicker(){
  const container=document.getElementById("amen-container");
  if(!container) return;
  container.innerHTML="";
  for(const [group,items] of Object.entries(AMENITY_GROUPS)){
    const sec=document.createElement("div");
    sec.className="amen-section";
    sec.innerHTML=`<div class="amen-group-label">${group}</div><div class="amen-chips"></div>`;
    container.appendChild(sec);
    const chipsEl=sec.querySelector(".amen-chips");
    items.forEach(a=>{
      const chip=document.createElement("div");
      chip.className="ac"+(selAmens.includes(a)?" sel":"");
      chip.textContent=a;
      chip.onclick=()=>{
        if(selAmens.includes(a)){selAmens=selAmens.filter(x=>x!==a);chip.classList.remove("sel");}
        else{selAmens.push(a);chip.classList.add("sel");}
      };
      chipsEl.appendChild(chip);
    });
  }
}

function buildTagPicker(){
  const container=document.getElementById("tag-container");
  if(!container) return;
  container.innerHTML="";
  for(const [group,items] of Object.entries(TAG_GROUPS)){
    const sec=document.createElement("div");
    sec.className="amen-section";
    sec.innerHTML=`<div class="amen-group-label">${group}</div><div class="amen-chips"></div>`;
    container.appendChild(sec);
    const chipsEl=sec.querySelector(".amen-chips");
    items.forEach(a=>{
      const chip=document.createElement("div");
      chip.className="ac"+(selTags.includes(a)?" sel":"");
      chip.textContent=a;
      chip.style.borderColor=selTags.includes(a)?"var(--gold)":"";
      chip.onclick=()=>{
        if(selTags.includes(a)){
          selTags=selTags.filter(x=>x!==a);
          chip.classList.remove("sel");
        } else {
          selTags.push(a);
          chip.classList.add("sel");
        }
      };
      chipsEl.appendChild(chip);
    });
  }
}

async function saveProperty(id){
  const btn=document.getElementById("save-btn");
  const name=(document.getElementById("fn")?.value||"").trim();
  const city=document.getElementById("fc")?.value||"";
  if(!name){toast("Name is required","err");return;}
  if(!city){toast("City is required","err");return;}
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>Saving…';
  const isNew=!id;
  const newId=id||("prop_"+Date.now());
  const data={
    id:newId, name, city,
    "item type":         document.getElementById("ftype")?.value||"",
    neighborhood:        document.getElementById("fhood")?.value?.trim()||"",
    address:             document.getElementById("faddr")?.value?.trim()||"",
    location:            document.getElementById("floc")?.value?.trim()||"",
    status:              document.getElementById("fstatus")?.value||"Active",
    "max pax":           document.getElementById("fpax")?.value||"",
    bedrooms:            document.getElementById("fbeds")?.value||"",
    bathrooms:           document.getElementById("fbaths")?.value||"",
    beds:                document.getElementById("fbedsn")?.value||"",
    capacity:            document.getElementById("fcap")?.value||"",
    feet:                document.getElementById("ffeet")?.value||"",
    // Pricing
    "client price":               document.getElementById("fprice")?.value?.trim()||"",
    "price range":                document.getElementById("fprange")?.value?.trim()||"",
    "our price":                  document.getElementById("foprice")?.value?.trim()||"",
    "quote 2025":                 document.getElementById("fquote")?.value?.trim()||"",
    "commission tier":            document.getElementById("fcomm")?.value||"",
    "payment methods":            document.getElementById("fpayment")?.value?.trim()||"",
    rating:                       document.getElementById("frating")?.value||"",
    "bachelor / party friendly":  document.getElementById("fparty")?.value||"",
    // Policies
    "cancellation policy":        document.getElementById("fcxl")?.value||"",
    "check-in time":              document.getElementById("fcheckin")?.value?.trim()||"",
    "check-out time":             document.getElementById("fcheckout")?.value?.trim()||"",
    "min hours":                  document.getElementById("fminhrs")?.value?.trim()||"",
    "max hours":                  document.getElementById("fmaxhrs")?.value?.trim()||"",
    "availability notes":         document.getElementById("favail")?.value?.trim()||"",
    // Contact
    "contact name":               document.getElementById("fcname")?.value?.trim()||"",
    contact:                      document.getElementById("fccontact")?.value?.trim()||"",
    "contact phone":              document.getElementById("fcphone")?.value?.trim()||"",
    "owner / poc":                document.getElementById("fowner")?.value?.trim()||"",
    "whatsapp group":             document.getElementById("fwagroup")?.value?.trim()||"",
    "staff contact":              document.getElementById("fstaff")?.value?.trim()||"",
    // Links
    "airbnb link":                document.getElementById("fairbnb")?.value?.trim()||"",
    "alternative airbnb links":   document.getElementById("fairbnb2")?.value?.trim()||"",
    "photos link":                document.getElementById("fphotos")?.value?.trim()||"",
    "alternative photos links":   document.getElementById("fphotos2")?.value?.trim()||"",
    "twp travel webpage":         document.getElementById("fweb")?.value?.trim()||"",
    "website link":               document.getElementById("fwebsite")?.value?.trim()||"",
    "pdf link":                   document.getElementById("fpdf")?.value?.trim()||"",
    "updated pdf link":           document.getElementById("fpdf2")?.value?.trim()||"",
    // Classification
    "venue type":                 document.getElementById("fvtype")?.value?.trim()||"",
    "subtype / boat type":        document.getElementById("fsubtype")?.value?.trim()||"",
    "dock location":              document.getElementById("fdock")?.value?.trim()||"",
    "ac below deck":              document.getElementById("facbelow")?.value||"",
    // Content
    description:                  document.getElementById("fdesc")?.value?.trim()||"",
    includes:                     document.getElementById("fincludes")?.value?.trim()||"",
    extras:                       document.getElementById("fextras")?.value?.trim()||"",
    "internal notes":             document.getElementById("fnotes")?.value?.trim()||"",
    // Chips
    amenities:                    selAmens.join(", "),
    tags:                         selTags.join(", "),
    updatedAt:           new Date().toISOString(),
  };
  if(isNew) data.createdAt=data.updatedAt;
  try{
    const res=await gas({action:isNew?"property_create":"property_update",data});
    if(res.ok===false) throw new Error(res.error||"Save error");
    if(isNew) allProps.unshift(data);
    else allProps=allProps.map(p=>(p.id||p.name)===id?{...p,...data}:p);
    document.getElementById("count-badge").textContent=allProps.length+" properties";
    selId=newId; renderList(); showDetail(newId);
    toast(isNew?"✓ Added to portfolio":"✓ Saved","ok");
  }catch(e){
    toast("Error: "+e.message,"err");
    btn.disabled=false; btn.innerHTML=id?"Save Changes":"Add to Portfolio";
  }
}

async function deleteProperty(id){
  const p=allProps.find(x=>(x.id||x.name)===id);
  if(!p) return;
  if(!confirm(`Delete "${p.name}"?\nThis cannot be undone.`)) return;
  try{
    await gas({action:"property_delete",data:{id}});
    allProps=allProps.filter(x=>(x.id||x.name)!==id);
    selId=null;
    document.getElementById("count-badge").textContent=allProps.length+" properties";
    renderList(); hide("main-content"); show("empty-state");
    toast("✓ Deleted","ok");
  }catch(e){toast("Error: "+e.message,"err");}
}

function show(id){const el=document.getElementById(id);if(el)el.style.display="";}
function hide(id){const el=document.getElementById(id);if(el)el.style.display="none";}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,type="ok"){
  const t=document.getElementById("toast");
  t.textContent=msg; t.className="toast "+type;
  setTimeout(()=>{t.className="toast gone";},3400);
}

load();
