<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two Travel · Portfolio Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --sand:#f7f4ef;--sand2:#efe9e0;--sand3:#e5ddd3;
  --ink:#1a1814;--ink2:#3d3a35;--ink3:#7a7570;
  --gold:#9a7d52;--gold2:#c4a272;--gold3:#e8d5b7;
  --white:#ffffff;--border:rgba(26,24,20,0.09);--border2:rgba(26,24,20,0.15);
  --green:#5cb87a;--red:#e05050;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jost',sans-serif;background:var(--sand);color:var(--ink);font-weight:300;min-height:100vh}

.header{background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;height:54px;position:sticky;top:0;z-index:10}
.logo{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:500;letter-spacing:.04em}
.hdiv{width:1px;height:14px;background:var(--border2);margin:0 13px}
.hls{font-size:10px;color:var(--ink3);letter-spacing:.12em;text-transform:uppercase}
.hright{margin-left:auto;display:flex;align-items:center;gap:10px}
.nav-link{font-size:11px;color:var(--ink3);text-decoration:none;letter-spacing:.06em;padding:4px 10px;border:1px solid var(--border);transition:all .1s}
.nav-link:hover{border-color:var(--gold);color:var(--gold)}
.count-badge{font-size:10px;color:var(--gold);border:1px solid var(--gold3);padding:3px 10px;background:rgba(154,125,82,.05);letter-spacing:.04em}

/* Layout */
.layout{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 54px)}
.sidebar{background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.main{overflow-y:auto;background:var(--sand)}

/* Sidebar */
.sb-head{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.sb-title{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px}
.sb-search{width:100%;padding:8px 11px;background:var(--sand);border:1px solid var(--border);font-family:'Jost',sans-serif;font-size:12px;color:var(--ink);outline:none;transition:border .1s;margin-bottom:8px}
.sb-search:focus{border-color:var(--gold)}
.sb-search::placeholder{color:var(--ink3)}
.filter-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.fpill{padding:3px 8px;border:1px solid var(--border);font-size:9px;color:var(--ink3);cursor:pointer;background:transparent;font-family:'Jost',sans-serif;letter-spacing:.04em;transition:all .1s}
.fpill.on{border-color:var(--gold);color:var(--gold);background:rgba(154,125,82,.06)}
.fpill:hover:not(.on){color:var(--ink2);border-color:var(--border2)}
.add-btn{width:100%;margin-top:8px;padding:8px;background:transparent;border:1px dashed var(--border2);font-family:'Jost',sans-serif;font-size:11px;color:var(--ink3);cursor:pointer;transition:all .1s;letter-spacing:.04em;display:flex;align-items:center;justify-content:center;gap:5px}
.add-btn:hover{border-color:var(--gold);color:var(--gold)}

.plist{flex:1;overflow-y:auto;padding:4px 0}
.plist::-webkit-scrollbar{width:3px}
.plist::-webkit-scrollbar-thumb{background:var(--sand3)}
.pi{padding:11px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;position:relative}
.pi:hover{background:var(--sand)}
.pi.active{background:var(--sand);border-left:2px solid var(--gold);padding-left:14px}
.pi-name{font-size:13px;color:var(--ink);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:3px}
.pi-tag{font-size:8px;padding:1px 5px;letter-spacing:.05em;text-transform:uppercase}
.tag-city{background:rgba(154,125,82,.08);color:var(--gold);border:1px solid var(--gold3)}
.tag-type{background:var(--sand2);color:var(--ink3);border:1px solid var(--border2)}
.tag-active{background:rgba(92,184,122,.08);color:#3a9960;border:1px solid rgba(92,184,122,.3)}
.tag-inactive{background:rgba(224,80,80,.07);color:var(--red);border:1px solid rgba(224,80,80,.2)}
.pi-meta{font-size:10px;color:var(--ink3)}

/* Main panel — detail / form */
.main-empty{height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--ink3);opacity:.5}
.main-empty p{font-size:10px;letter-spacing:.08em;text-transform:uppercase}

.detail{padding:32px 36px}
.det-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.det-name{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400}
.det-sub{font-size:11px;color:var(--ink3);margin-top:3px;letter-spacing:.04em}
.det-actions{display:flex;gap:8px;flex-shrink:0;margin-top:4px}
.d-btn{padding:6px 14px;border:1px solid var(--border2);background:transparent;font-family:'Jost',sans-serif;font-size:10px;color:var(--ink3);cursor:pointer;transition:all .1s;letter-spacing:.06em}
.d-btn:hover{border-color:var(--gold);color:var(--gold)}
.d-btn.pri{background:var(--ink);color:var(--white);border-color:var(--ink)}
.d-btn.pri:hover{background:var(--gold);border-color:var(--gold)}
.d-btn.del{color:var(--red);border-color:rgba(224,80,80,.3)}
.d-btn.del:hover{background:rgba(224,80,80,.07);border-color:var(--red)}

/* Field grid */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.fg.three{grid-template-columns:1fr 1fr 1fr}
.fg.single{grid-template-columns:1fr}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
.fl{font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3)}
.fv{font-size:13px;color:var(--ink2);line-height:1.6}
.fv.em{color:var(--ink3);font-style:italic;font-size:12px}
.flink{font-size:12px;color:#1d4ed8;text-decoration:underline;word-break:break-all}
.sec-lbl{font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);
  padding:16px 0 10px;grid-column:1/-1;border-top:1px solid var(--border);margin-top:4px}
.sec-lbl:first-child{border-top:none;padding-top:0;margin-top:0}

/* Amenity display */
.amenity-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.a-chip{padding:3px 9px;font-size:10px;border:1px solid var(--border2);color:var(--ink3)}

/* Form mode */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-grid.three{grid-template-columns:1fr 1fr 1fr}
label{font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3)}
input,select,textarea{padding:8px 11px;background:var(--white);border:1px solid var(--border2);font-family:'Jost',sans-serif;font-size:13px;color:var(--ink);outline:none;transition:border .1s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
input::placeholder,textarea::placeholder{color:var(--ink3)}
textarea{resize:vertical;min-height:70px}
.form-sec{font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);
  padding:16px 0 10px;grid-column:1/-1;border-top:1px solid var(--border);margin-top:4px}
.form-sec:first-child{border-top:none;padding-top:0;margin-top:0}
.checkbox-row{display:flex;align-items:center;gap:8px;padding:8px 0}
.checkbox-row input[type=checkbox]{width:15px;height:15px;cursor:pointer;flex-shrink:0}
.checkbox-row span{font-size:13px;color:var(--ink2)}
.form-btns{display:flex;gap:10px;align-items:center;margin-top:24px;padding-top:18px;border-top:1px solid var(--border);grid-column:1/-1}
.fn-btn{padding:9px 22px;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.06em;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--ink2);transition:all .12s}
.fn-btn:hover{border-color:var(--gold);color:var(--gold)}
.fn-btn.pri{background:var(--ink);color:var(--white);border-color:var(--ink)}
.fn-btn.pri:hover{background:var(--gold);border-color:var(--gold)}
.fn-btn:disabled{opacity:.4;cursor:not-allowed}

/* Amenity picker */
.amenity-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.amenity-chip{padding:4px 10px;border:1px solid var(--border2);font-size:11px;color:var(--ink3);cursor:pointer;transition:all .1s;user-select:none}
.amenity-chip.sel{border-color:var(--gold);color:var(--gold);background:rgba(154,125,82,.06)}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:11px 18px;font-size:12px;letter-spacing:.04em;border:1px solid;z-index:200;transition:all .2s;pointer-events:none}
.toast.ok{background:rgba(92,184,122,.1);border-color:rgba(92,184,122,.4);color:#3a9960}
.toast.err{background:rgba(224,80,80,.08);border-color:rgba(224,80,80,.3);color:var(--red)}
.toast.gone{opacity:0;transform:translateY(8px)}

.spinner{display:inline-block;width:12px;height:12px;border:1.5px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header class="header">
  <span class="logo">Two Travel</span>
  <div class="hdiv"></div>
  <span class="hls">Portfolio Manager</span>
  <div class="hright">
    <span class="count-badge" id="count-badge">— properties</span>
    <a href="/agent.html" class="nav-link">← Sales Agent</a>
  </div>
</header>

<div class="layout">
  <!-- LEFT: list -->
  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-title">Portfolio</div>
      <input class="sb-search" id="sb-search" placeholder="Search name, neighborhood…" oninput="renderList()">
      <div class="filter-row" id="city-pills">
        <button class="fpill on" onclick="setFilter('city','')">All</button>
        <button class="fpill" onclick="setFilter('city','cartagena')">Cartagena</button>
        <button class="fpill" onclick="setFilter('city','medellín')">Medellín</button>
        <button class="fpill" onclick="setFilter('city','mexico city')">CDMX</button>
        <button class="fpill" onclick="setFilter('city','tulum')">Tulum</button>
        <button class="fpill" onclick="setFilter('city','bogotá')">Bogotá</button>
      </div>
      <div class="filter-row">
        <button class="fpill on" onclick="setFilter('type','')">All types</button>
        <button class="fpill" onclick="setFilter('type','villa')">Villas</button>
        <button class="fpill" onclick="setFilter('type','penthouse')">Penthouses</button>
        <button class="fpill" onclick="setFilter('type','boat')">Boats</button>
        <button class="fpill" onclick="setFilter('type','speedboat')">Speedboats</button>
        <button class="fpill" onclick="setFilter('type','catamaran')">Catamarans</button>
        <button class="fpill" onclick="setFilter('type','wedding venue')">Venues</button>
      </div>
      <button class="add-btn" onclick="openNew()">
        <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add property
      </button>
    </div>
    <div class="plist" id="plist">
      <div style="padding:24px 16px;text-align:center;font-size:11px;color:var(--ink3);letter-spacing:.06em">
        <span class="spinner"></span>Loading…
      </div>
    </div>
  </div>

  <!-- RIGHT: detail / form -->
  <div class="main" id="main">
    <div class="main-empty" id="main-empty">
      <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <p>Select a property</p>
    </div>
    <div id="main-content" style="display:none"></div>
  </div>
</div>

<div class="toast gone" id="toast"></div>

<script>
const GAS = "https://script.google.com/macros/s/AKfycbwVj2nl99gFJB0ZeFIm_WrS2TepT2mu3m-tAoEy0Wc5-oO9Rj33i16nAp0jFBqLSI665A/exec";

const AMENITIES = [
  'Pool','Infinity Pool','Jacuzzi','Rooftop','Ocean View','Sea View',
  'Mountain View','Garden','Terrace','Balcony','Outdoor Kitchen',
  'Outdoor Shower','BBQ','Sound System','Karaoke','WiFi','Smart TV',
  'Parking','Security','Laundry','Pet Friendly','Waterfront','Beach Access',
  'Yoga Space','Wine Cellar','Sauna','Steam Room','Tennis Court',
  'Gym','City View','Valley View','Private Dock','Captain Included',
  'Crew Included','AC','Heated Pool','Fire Pit','Bar',
];

const CITIES = ['Cartagena','Medellín','Mexico City','Tulum','Cancún','Bogotá','Santa Marta','Miami'];
const TYPES  = ['Villa','Penthouse','Apartment','Boat / Yacht','Catamaran','Speedboat','Wedding Venue','Hotel','Finca'];

let allProps = [];
let selId = null;
let filters = { city: '', type: '' };
let editAmenities = [];

async function gas(body) {
  const r = await fetch(GAS, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body),
  });
  const t = await r.text();
  try { return JSON.parse(t); } catch { return { error: t }; }
}

async function load() {
  try {
    const d = await gas({ action: 'property_list' });
    allProps = d.properties || [];
    document.getElementById('count-badge').textContent = allProps.length + ' properties';
    renderList();
  } catch(e) {
    toast('Could not load properties — check connection', 'err');
  }
}

function setFilter(key, val) {
  filters[key] = val;
  document.querySelectorAll(key === 'city' ? '#city-pills .fpill' : '.filter-row:nth-of-type(2) .fpill')
    .forEach(p => {
      const oc = p.getAttribute('onclick') || '';
      p.classList.toggle('on', oc.includes(`'${val}'`));
    });
  // simpler: re-query all pills and toggle based on active value
  document.querySelectorAll('.fpill').forEach(p => {
    const oc = p.getAttribute('onclick') || '';
    if (oc.includes(`'${key}'`)) {
      p.classList.toggle('on', oc.includes(`'${val}'`));
    }
  });
  renderList();
}

function renderList() {
  const q = (document.getElementById('sb-search').value || '').toLowerCase();
  const list = document.getElementById('plist');

  let filtered = allProps.filter(p => {
    const city = (p.city || '').toLowerCase();
    const type = (p.type || '').toLowerCase();
    const name = (p.name || '').toLowerCase();
    const hood = (p.neighborhood || '').toLowerCase();
    const tags = (p.amenities || '').toLowerCase();
    const cityOk = !filters.city || city.includes(filters.city);
    const typeOk = !filters.type || type.includes(filters.type);
    const qOk    = !q || name.includes(q) || hood.includes(q) || city.includes(q) || tags.includes(q);
    return cityOk && typeOk && qOk;
  }).sort((a,b) => (a.name||'').localeCompare(b.name||''));

  if (!filtered.length) {
    list.innerHTML = '<div style="padding:24px;text-align:center;font-size:11px;color:var(--ink3);letter-spacing:.06em">No properties found</div>';
    return;
  }

  list.innerHTML = '';
  filtered.forEach(p => {
    const el = document.createElement('div');
    el.className = 'pi' + (p.id === selId ? ' active' : '');
    el.onclick = () => showDetail(p.id);
    const statusTag = p.status === 'Active'
      ? '<span class="pi-tag tag-active">Active</span>'
      : p.status === 'Inactive'
        ? '<span class="pi-tag tag-inactive">Inactive</span>'
        : '<span class="pi-tag tag-type">'+esc(p.status||'')+'</span>';
    const pax = p.maxPax ? `👥 ${p.maxPax}` : '';
    const beds = p.bedrooms ? `🛏 ${p.bedrooms}` : '';
    el.innerHTML = `
      <div class="pi-tags">
        <span class="pi-tag tag-city">${esc(p.city||'')}</span>
        <span class="pi-tag tag-type">${esc(p.type||'')}</span>
        ${statusTag}
      </div>
      <div class="pi-name">${esc(p.name||'—')}</div>
      <div class="pi-meta">${[p.neighborhood, [pax,beds].filter(Boolean).join(' · ')].filter(Boolean).join(' · ')}</div>
    `;
    list.appendChild(el);
  });
}

function showDetail(id) {
  selId = id;
  renderList(); // refresh active state
  const p = allProps.find(x => x.id === id);
  if (!p) return;

  document.getElementById('main-empty').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';

  const amenArr = (p.amenities || '').split(',').map(s => s.trim()).filter(Boolean);

  document.getElementById('main-content').innerHTML = `
    <div class="detail">
      <div class="det-head">
        <div>
          <div class="det-name">${esc(p.name)}</div>
          <div class="det-sub">${[p.city, p.neighborhood, p.type].filter(Boolean).join(' · ')}</div>
        </div>
        <div class="det-actions">
          ${p.airbnbLink ? `<a href="${esc(p.airbnbLink)}" target="_blank" class="d-btn" style="text-decoration:none">Airbnb ↗</a>` : ''}
          ${p.photosLink ? `<a href="${esc(p.photosLink)}" target="_blank" class="d-btn" style="text-decoration:none">Photos ↗</a>` : ''}
          <button class="d-btn pri" onclick="openEdit('${id}')">✏️ Edit</button>
          <button class="d-btn del" onclick="deleteProperty('${id}')">Delete</button>
        </div>
      </div>

      <div class="fg three">
        <div class="sec-lbl">Details</div>
        ${field('City', p.city)}
        ${field('Type', p.type)}
        ${field('Status', p.status)}
        ${field('Neighborhood', p.neighborhood)}
        ${field('Max Guests', p.maxPax ? p.maxPax + ' pax' : '')}
        ${field('Bedrooms', p.bedrooms)}
        ${field('Bathrooms', p.bathrooms)}
        ${field('Bachelor / Party', p.bachelorFriendly === 'TRUE' || p.bachelorFriendly === true ? '✅ Yes' : '—')}

        <div class="sec-lbl">Pricing</div>
        ${field('Client Price', p.clientPrice)}
        ${field('Our Price', p.ourPrice)}

        ${p.description ? `<div class="field full"><div class="fl">Description</div><div class="fv">${esc(p.description)}</div></div>` : ''}

        ${amenArr.length ? `
        <div class="field full">
          <div class="fl">Amenities & Tags</div>
          <div class="amenity-chips">
            ${amenArr.map(a => `<span class="a-chip">${esc(a)}</span>`).join('')}
          </div>
        </div>` : ''}

        <div class="sec-lbl">Links</div>
        ${p.airbnbLink ? `<div class="field full"><div class="fl">Airbnb</div><a href="${esc(p.airbnbLink)}" target="_blank" class="flink">${esc(p.airbnbLink)}</a></div>` : ''}
        ${p.photosLink ? `<div class="field full"><div class="fl">Photos</div><a href="${esc(p.photosLink)}" target="_blank" class="flink">${esc(p.photosLink)}</a></div>` : ''}
      </div>
    </div>
  `;
}

function field(label, val) {
  if (!val && val !== 0) return `<div class="field"><div class="fl">${label}</div><div class="fv em">—</div></div>`;
  return `<div class="field"><div class="fl">${label}</div><div class="fv">${esc(String(val))}</div></div>`;
}

function openNew() {
  selId = null;
  renderList();
  showForm(null);
}

function openEdit(id) {
  showForm(allProps.find(p => p.id === id));
}

function showForm(p) {
  document.getElementById('main-empty').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';

  editAmenities = p ? (p.amenities || '').split(',').map(s => s.trim()).filter(Boolean) : [];

  const cityOpts = CITIES.map(c => `<option value="${c}" ${p?.city===c?'selected':''}>${c}</option>`).join('');
  const typeOpts = TYPES.map(t => `<option value="${t}" ${p?.type===t?'selected':''}>${t}</option>`).join('');
  const statusOpts = ['Active','Inactive','Pending Review'].map(s => `<option value="${s}" ${(p?.status||'Active')===s?'selected':''}>${s}</option>`).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="detail">
      <div class="det-head" style="margin-bottom:20px;padding-bottom:16px">
        <div class="det-name">${p ? 'Edit — ' + esc(p.name) : 'New Property'}</div>
        ${p ? `<button class="d-btn" onclick="showDetail('${p.id}')">Cancel</button>` : `<button class="d-btn" onclick="document.getElementById('main-content').style.display='none';document.getElementById('main-empty').style.display='flex'">Cancel</button>`}
      </div>

      <div class="form-grid" id="prop-form">
        <div class="form-sec">Basic Info</div>

        <div class="field full">
          <label>Property Name *</label>
          <input id="f-name" value="${esc(p?.name||'')}" placeholder="e.g. Casa Azul · Bocagrande" required>
        </div>
        <div class="field">
          <label>City *</label>
          <select id="f-city"><option value="">— Select —</option>${cityOpts}</select>
        </div>
        <div class="field">
          <label>Type</label>
          <select id="f-type">${typeOpts}</select>
        </div>
        <div class="field">
          <label>Neighborhood / Area</label>
          <input id="f-hood" value="${esc(p?.neighborhood||'')}" placeholder="e.g. Bocagrande, El Poblado">
        </div>
        <div class="field">
          <label>Status</label>
          <select id="f-status">${statusOpts}</select>
        </div>

        <div class="form-sec">Capacity & Rooms</div>
        <div class="field">
          <label>Max Guests (pax)</label>
          <input id="f-pax" type="number" value="${esc(p?.maxPax||'')}" placeholder="20" min="1">
        </div>
        <div class="field">
          <label>Bedrooms</label>
          <input id="f-beds" type="number" value="${esc(p?.bedrooms||'')}" placeholder="6" min="0">
        </div>
        <div class="field">
          <label>Bathrooms</label>
          <input id="f-baths" type="number" value="${esc(p?.bathrooms||'')}" placeholder="5" min="0">
        </div>
        <div class="field">
          <div class="checkbox-row">
            <input id="f-party" type="checkbox" ${(p?.bachelorFriendly==='TRUE'||p?.bachelorFriendly===true)?'checked':''}>
            <span>Bachelor / Party Friendly</span>
          </div>
        </div>

        <div class="form-sec">Pricing</div>
        <div class="field">
          <label>Client Price (per night)</label>
          <input id="f-price" value="${esc(p?.clientPrice||'')}" placeholder="$3,500 USD/night">
        </div>
        <div class="field">
          <label>Our Price (internal)</label>
          <input id="f-ourprice" value="${esc(p?.ourPrice||'')}" placeholder="$2,800 USD/night">
        </div>

        <div class="form-sec">Links</div>
        <div class="field">
          <label>Airbnb / Booking Link</label>
          <input id="f-airbnb" value="${esc(p?.airbnbLink||'')}" placeholder="https://airbnb.com/rooms/...">
        </div>
        <div class="field">
          <label>Photos / Drive Link</label>
          <input id="f-photos" value="${esc(p?.photosLink||'')}" placeholder="https://drive.google.com/...">
        </div>

        <div class="form-sec">Description & Amenities</div>
        <div class="field full">
          <label>Description</label>
          <textarea id="f-desc" placeholder="What makes it special…">${esc(p?.description||'')}</textarea>
        </div>
        <div class="field full">
          <label>Amenities (click to select)</label>
          <div class="amenity-grid" id="amenity-grid"></div>
        </div>

        <div class="form-btns">
          <button class="fn-btn pri" id="save-btn" onclick="saveProperty(${p?`'${p.id}'`:null})">
            ${p ? 'Save Changes' : 'Add to Portfolio'}
          </button>
          ${p ? `<button class="fn-btn" onclick="showDetail('${p.id}')">Cancel</button>` : `<button class="fn-btn" onclick="document.getElementById('main-content').style.display='none';document.getElementById('main-empty').style.display='flex'">Cancel</button>`}
          <span id="form-msg" style="font-size:11px;color:var(--ink3);margin-left:8px"></span>
        </div>
      </div>
    </div>
  `;

  initAmenityGrid();
}

function initAmenityGrid() {
  const grid = document.getElementById('amenity-grid');
  if (!grid) return;
  grid.innerHTML = '';
  AMENITIES.forEach(a => {
    const chip = document.createElement('div');
    chip.className = 'amenity-chip' + (editAmenities.includes(a) ? ' sel' : '');
    chip.textContent = a;
    chip.onclick = () => {
      if (editAmenities.includes(a)) {
        editAmenities = editAmenities.filter(x => x !== a);
        chip.classList.remove('sel');
      } else {
        editAmenities.push(a);
        chip.classList.add('sel');
      }
    };
    grid.appendChild(chip);
  });
}

async function saveProperty(id) {
  const btn = document.getElementById('save-btn');
  const msg = document.getElementById('form-msg');
  const name = document.getElementById('f-name')?.value?.trim();
  const city = document.getElementById('f-city')?.value;
  if (!name) { toast('Property name is required', 'err'); return; }
  if (!city) { toast('City is required', 'err'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Saving…';

  const data = {
    id:              id || ('prop_' + Date.now()),
    name,
    city,
    type:            document.getElementById('f-type')?.value || '',
    neighborhood:    document.getElementById('f-hood')?.value?.trim() || '',
    status:          document.getElementById('f-status')?.value || 'Active',
    maxPax:          document.getElementById('f-pax')?.value || '',
    bedrooms:        document.getElementById('f-beds')?.value || '',
    bathrooms:       document.getElementById('f-baths')?.value || '',
    bachelorFriendly: document.getElementById('f-party')?.checked ? 'TRUE' : 'FALSE',
    clientPrice:     document.getElementById('f-price')?.value?.trim() || '',
    ourPrice:        document.getElementById('f-ourprice')?.value?.trim() || '',
    airbnbLink:      document.getElementById('f-airbnb')?.value?.trim() || '',
    photosLink:      document.getElementById('f-photos')?.value?.trim() || '',
    description:     document.getElementById('f-desc')?.value?.trim() || '',
    amenities:       editAmenities.join(', '),
    updatedAt:       new Date().toISOString(),
  };
  if (!id) data.createdAt = data.updatedAt;

  try {
    const res = await gas({ action: id ? 'property_update' : 'property_create', data });
    if (res.ok === false) throw new Error(res.error || 'Error saving');

    // Update local cache
    if (id) {
      allProps = allProps.map(p => p.id === id ? { ...p, ...data } : p);
    } else {
      allProps.unshift(data);
    }
    document.getElementById('count-badge').textContent = allProps.length + ' properties';
    renderList();
    selId = data.id;
    showDetail(data.id);
    toast(id ? '✓ Property updated' : '✓ Added to portfolio', 'ok');
  } catch(e) {
    toast('Error: ' + e.message, 'err');
    btn.disabled = false;
    btn.textContent = id ? 'Save Changes' : 'Add to Portfolio';
  }
}

async function deleteProperty(id) {
  const p = allProps.find(x => x.id === id);
  if (!p) return;
  if (!confirm(`Delete "${p.name}"? This cannot be undone.`)) return;

  try {
    await gas({ action: 'property_delete', data: { id } });
    allProps = allProps.filter(x => x.id !== id);
    document.getElementById('count-badge').textContent = allProps.length + ' properties';
    selId = null;
    renderList();
    document.getElementById('main-content').style.display = 'none';
    document.getElementById('main-empty').style.display = 'flex';
    toast('✓ Property deleted', 'ok');
  } catch(e) {
    toast('Error deleting: ' + e.message, 'err');
  }
}

function toast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  setTimeout(() => { t.className = 'toast gone'; }, 3200);
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ─────────────────────────────────────────────────────────────
load();
</script>
</body>
</html>
